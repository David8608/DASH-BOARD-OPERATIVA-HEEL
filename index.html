<head>

<!-- ==================== LIBRERÍAS EXTERNAS (CDN) ==================== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.25/dist/jspdf.plugin.autotable.min.js"></script>

<style>
/* ==================================================================
   TORRE DE CONTROL OPERATIVA — HEEL COLOMBIA
   Sistema de diseño inspirado en Microsoft Fabric / Power BI / SAC
   ================================================================== */

:root{
  --font-display:'Manrope', sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'JetBrains Mono', monospace;

  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:14px;

  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
  --space-5:20px; --space-6:24px; --space-8:32px; --space-10:40px; --space-12:48px;

  --success:#0F9D58;
  --success-bg:rgba(15,157,88,0.12);
  --warning:#F2A600;
  --warning-bg:rgba(242,166,0,0.14);
  --danger:#D13438;
  --danger-bg:rgba(209,52,56,0.12);
  --info:#0F6CBD;
  --info-bg:rgba(15,108,189,0.12);
}

html[data-theme="light"]{
  --bg:#F3F4F7;
  --bg-elevated:#FFFFFF;
  --card:#FFFFFF;
  --card-alt:#F8F9FB;
  --border:#E3E5EA;
  --border-strong:#CBCFD8;
  --text:#171A21;
  --text-secondary:#5B616E;
  --text-tertiary:#8A8F9B;
  --accent:#0F6CBD;
  --accent-strong:#0A4E8A;
  --accent-soft:rgba(15,108,189,0.10);
  --shadow:0 1px 2px rgba(20,24,33,0.04), 0 4px 16px rgba(20,24,33,0.04);
  --shadow-hover:0 2px 4px rgba(20,24,33,0.06), 0 10px 28px rgba(20,24,33,0.08);
  --map-tile-filter:none;
  --scroll-thumb:#C7CBD4;
}

html[data-theme="dark"]{
  --bg:#0D1017;
  --bg-elevated:#12151D;
  --card:#151922;
  --card-alt:#1A1E28;
  --border:#262B37;
  --border-strong:#333947;
  --text:#EDEEF2;
  --text-secondary:#9BA1AF;
  --text-tertiary:#6D7280;
  --accent:#4FA3F7;
  --accent-strong:#7FBBFA;
  --accent-soft:rgba(79,163,247,0.14);
  --shadow:0 1px 2px rgba(0,0,0,0.3), 0 4px 20px rgba(0,0,0,0.35);
  --shadow-hover:0 2px 6px rgba(0,0,0,0.4), 0 12px 32px rgba(0,0,0,0.45);
  --map-tile-filter:brightness(0.75) invert(1) contrast(0.9) hue-rotate(180deg) saturate(0.6);
  --scroll-thumb:#333947;
}

*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  transition:background .25s ease, color .25s ease;
  min-height:100vh;
}
::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--scroll-thumb); border-radius:10px;}

a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
input,select{font-family:inherit;}

.num{font-family:var(--font-mono); font-variant-numeric:tabular-nums;}

/* ---------- Pantalla de carga ---------- */
#loadingScreen{
  position:fixed; inset:0; z-index:9999;
  background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:var(--space-5);
  transition:opacity .4s ease, visibility .4s ease;
}
#loadingScreen.hidden{opacity:0; visibility:hidden; pointer-events:none;}
.loader-mark{
  width:56px; height:56px; border-radius:50%;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  animation:spin 0.9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-family:var(--font-display); font-weight:700; font-size:15px; color:var(--text-secondary); letter-spacing:.02em;}
.loader-bar-track{width:280px; height:4px; background:var(--border); border-radius:4px; overflow:hidden;}
.loader-bar-fill{height:100%; width:0%; background:linear-gradient(90deg, var(--accent), var(--accent-strong)); transition:width .3s ease;}
.loader-sub{font-size:12px; color:var(--text-tertiary); font-family:var(--font-mono);}

/* ---------- Layout general ---------- */
.app{max-width:1920px; margin:0 auto; padding:0 var(--space-8) var(--space-12);}
@media (max-width:900px){ .app{padding:0 var(--space-4) var(--space-10);} }

/* ---------- Encabezado ---------- */
header.topbar{
  position:sticky; top:0; z-index:500;
  background:var(--bg-elevated);
  border-bottom:1px solid var(--border);
  padding:var(--space-4) var(--space-8);
  display:flex; align-items:center; justify-content:space-between; gap:var(--space-6);
  flex-wrap:wrap;
}
@media (max-width:900px){ header.topbar{padding:var(--space-3) var(--space-4);} }

.brand{display:flex; align-items:center; gap:var(--space-4);}
.brand-logo{
  width:44px; height:44px; border-radius:var(--radius-md);
  background:linear-gradient(135deg, var(--accent), var(--accent-strong));
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-family:var(--font-display); font-weight:800; font-size:16px;
  flex-shrink:0;
}
.brand-text h1{font-family:var(--font-display); font-size:16px; font-weight:800; letter-spacing:.01em;}
.brand-text p{font-size:12px; color:var(--text-secondary); font-weight:500; margin-top:1px;}

.topbar-right{display:flex; align-items:center; gap:var(--space-5); flex-wrap:wrap;}
.date-block{text-align:right; font-size:12px; line-height:1.5;}
.date-block .d-main{font-family:var(--font-mono); font-weight:600; color:var(--text);}
.date-block .d-sub{color:var(--text-tertiary);}

.btn{
  border:1px solid var(--border-strong); background:var(--card); color:var(--text);
  padding:9px 16px; border-radius:var(--radius-sm); font-size:13px; font-weight:600;
  display:inline-flex; align-items:center; gap:7px; transition:all .15s ease;
}
.btn:hover{border-color:var(--accent); color:var(--accent); box-shadow:var(--shadow-hover);}
.btn-primary{background:var(--accent); border-color:var(--accent); color:#fff;}
.btn-primary:hover{background:var(--accent-strong); border-color:var(--accent-strong); color:#fff;}
.btn-ghost{border-color:transparent; background:transparent;}
.btn-ghost:hover{background:var(--card-alt); box-shadow:none;}
.btn-sm{padding:6px 11px; font-size:12px;}

.theme-toggle{display:flex; border:1px solid var(--border-strong); border-radius:20px; padding:3px; gap:2px; background:var(--card);}
.theme-toggle button{
  border:none; background:transparent; padding:6px 12px; border-radius:16px; font-size:13px;
  color:var(--text-tertiary); font-weight:600;
}
.theme-toggle button.active{background:var(--accent); color:#fff;}

/* ---------- Filtros ---------- */
.filters-bar{
  position:sticky; top:73px; z-index:400;
  background:var(--bg-elevated); border-bottom:1px solid var(--border);
  padding:var(--space-4) var(--space-8);
  box-shadow:var(--shadow);
}
@media (max-width:900px){ .filters-bar{padding:var(--space-3) var(--space-4); top:64px;} }
.filters-grid{
  display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:var(--space-3);
  align-items:end;
}
.field{display:flex; flex-direction:column; gap:5px;}
.field label{font-size:11px; font-weight:700; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:.04em;}
.field select, .field input{
  border:1px solid var(--border-strong); background:var(--card); color:var(--text);
  padding:8px 10px; border-radius:var(--radius-sm); font-size:13px; height:36px;
}
.field select:focus, .field input:focus{outline:2px solid var(--accent-soft); border-color:var(--accent);}
.filters-actions{display:flex; gap:var(--space-2); align-items:flex-end;}

/* ---------- Contenido / módulos ---------- */
main{padding-top:var(--space-8);}
.module{margin-bottom:var(--space-10);}
.module-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:var(--space-5); gap:var(--space-4); flex-wrap:wrap;}
.module-head h2{font-family:var(--font-display); font-size:18px; font-weight:800;}
.module-head .module-eyebrow{font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:.06em; margin-bottom:3px; display:block;}
.module-head .module-sub{font-size:12.5px; color:var(--text-tertiary);}

.card{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:var(--space-6); box-shadow:var(--shadow); transition:box-shadow .2s ease, transform .2s ease;
}
.card.hoverable:hover{box-shadow:var(--shadow-hover); transform:translateY(-2px);}

.grid{display:grid; gap:var(--space-5);}
.grid-kpi{grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:1fr 1fr 1fr;}
.grid-map{grid-template-columns:2.3fr 1fr;}
.grid-idx{grid-template-columns:1fr 2fr;}
@media (max-width:1400px){ .grid-map{grid-template-columns:1fr;} }
@media (max-width:900px){ .grid-2,.grid-3,.grid-idx{grid-template-columns:1fr;} }

/* KPI cards */
.kpi-card{position:relative; overflow:hidden;}
.kpi-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--space-3);}
.kpi-icon{width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px;}
.kpi-label{font-size:11.5px; font-weight:700; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:.03em;}
.kpi-value{font-family:var(--font-mono); font-size:26px; font-weight:700; letter-spacing:-.01em; margin:2px 0 6px;}
.kpi-delta{font-size:12px; font-weight:700; display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:20px;}
.kpi-delta.up{color:var(--success); background:var(--success-bg);}
.kpi-delta.down{color:var(--danger); background:var(--danger-bg);}
.kpi-delta.flat{color:var(--text-tertiary); background:var(--card-alt);}

/* Tablas */
table.data-table{width:100%; border-collapse:collapse; font-size:13px;}
table.data-table th{
  text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--text-tertiary);
  padding:10px 12px; border-bottom:2px solid var(--border); cursor:pointer; user-select:none; white-space:nowrap;
  position:sticky; top:0; background:var(--card);
}
table.data-table th:hover{color:var(--accent);}
table.data-table td{padding:9px 12px; border-bottom:1px solid var(--border); white-space:nowrap;}
table.data-table tbody tr:hover{background:var(--card-alt);}
.table-scroll{overflow:auto; max-height:420px; border-radius:var(--radius-md); border:1px solid var(--border);}

.badge{display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:20px; font-size:11.5px; font-weight:700;}
.badge.green{color:var(--success); background:var(--success-bg);}
.badge.yellow{color:var(--warning); background:var(--warning-bg);}
.badge.red{color:var(--danger); background:var(--danger-bg);}
.dot{width:8px; height:8px; border-radius:50%; display:inline-block;}
.dot.green{background:var(--success);} .dot.yellow{background:var(--warning);} .dot.red{background:var(--danger);}

/* Barras horizontales (rankings) */
.rank-row{display:grid; grid-template-columns:26px 1fr 90px; gap:10px; align-items:center; padding:7px 0;}
.rank-pos{font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary); font-weight:700;}
.rank-name{font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.rank-bar-track{height:6px; background:var(--card-alt); border-radius:6px; margin-top:4px; overflow:hidden;}
.rank-bar-fill{height:100%; background:linear-gradient(90deg, var(--accent), var(--accent-strong)); border-radius:6px;}
.rank-value{font-family:var(--font-mono); font-size:12.5px; font-weight:700; text-align:right;}

/* Alertas / insights */
.alert-item, .insight-item{
  display:flex; gap:12px; align-items:flex-start; padding:12px 14px; border-radius:var(--radius-md);
  border:1px solid var(--border); margin-bottom:8px; font-size:13px; background:var(--card-alt);
}
.alert-item .a-icon{font-size:16px; line-height:1;}
.alert-item .a-text b{font-weight:700;}
.insight-item{border-left:3px solid var(--accent);}

/* Gauge */
.gauge-wrap{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:var(--space-2);}
.gauge-score{font-family:var(--font-mono); font-size:40px; font-weight:800;}
.gauge-caption{font-size:12.5px; color:var(--text-secondary); font-weight:600; text-align:center;}
.gauge-legend{display:flex; gap:var(--space-4); margin-top:var(--space-2); font-size:11px; color:var(--text-tertiary);}

/* Mapa */
#mapCard{padding:0; overflow:hidden;}
.map-toolbar{
  display:flex; align-items:center; justify-content:space-between; gap:var(--space-3); flex-wrap:wrap;
  padding:var(--space-4) var(--space-6); border-bottom:1px solid var(--border);
}
.map-toolbar .group{display:flex; align-items:center; gap:var(--space-2); flex-wrap:wrap;}
.segmented{display:flex; border:1px solid var(--border-strong); border-radius:var(--radius-sm); overflow:hidden;}
.segmented button{border:none; background:var(--card); padding:7px 13px; font-size:12.5px; font-weight:700; color:var(--text-secondary);}
.segmented button.active{background:var(--accent); color:#fff;}
#mapContainer{height:620px; width:100%;}
.map-stats-bar{display:flex; gap:var(--space-6); padding:var(--space-4) var(--space-6); flex-wrap:wrap; border-bottom:1px solid var(--border);}
.map-stat{font-size:12px;}
.map-stat b{display:block; font-family:var(--font-mono); font-size:18px; font-weight:700; color:var(--text);}
.map-side{padding:var(--space-6); display:flex; flex-direction:column; gap:var(--space-5);}
.coverage-panel h3{font-size:13px; font-weight:800; margin-bottom:var(--space-3);}
.coverage-metric{display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px dashed var(--border); font-size:13px;}
.coverage-metric b{font-family:var(--font-mono);}
.leaflet-popup-content-wrapper{background:var(--card); color:var(--text); border-radius:var(--radius-md);}
.leaflet-popup-tip{background:var(--card);}
.popup-title{font-weight:800; font-size:13px; margin-bottom:6px;}
.popup-row{font-size:12px; display:flex; justify-content:space-between; gap:10px; padding:2px 0;}

/* Tabla operativa */
.table-toolbar{display:flex; align-items:center; justify-content:space-between; gap:var(--space-3); margin-bottom:var(--space-4); flex-wrap:wrap;}
.search-box{position:relative;}
.search-box input{padding-left:32px; min-width:240px;}
.search-box::before{content:"⌕"; position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text-tertiary); font-size:15px;}
.pagination{display:flex; align-items:center; gap:var(--space-3); margin-top:var(--space-4); font-size:12.5px; color:var(--text-secondary);}
.pagination button{border:1px solid var(--border-strong); background:var(--card); border-radius:var(--radius-sm); padding:5px 10px;}
.pagination button:disabled{opacity:.4; cursor:not-allowed;}

.chart-box{position:relative; height:280px;}
.chart-box.tall{height:340px;}

.empty-note{font-size:12.5px; color:var(--text-tertiary); text-align:center; padding:var(--space-6);}

.demo-banner{
  background:var(--warning-bg); color:var(--warning); border:1px solid var(--warning);
  padding:10px 16px; border-radius:var(--radius-md); font-size:12.5px; font-weight:600;
  margin:var(--space-4) 0; display:flex; align-items:center; gap:8px;
}

footer.app-footer{text-align:center; padding:var(--space-8) 0; font-size:12px; color:var(--text-tertiary);}

@media print{
  header.topbar, .filters-bar, .btn, .map-toolbar, #themeToggle, .no-print{display:none !important;}
}
</style>
</head>

<!-- ==================== PANTALLA DE CARGA ==================== -->
<div id="loadingScreen">
  <div class="loader-mark"></div>
  <div class="loader-text">Cargando Torre de Control Operativa</div>
  <div class="loader-bar-track"><div class="loader-bar-fill" id="loaderBarFill"></div></div>
  <div class="loader-sub" id="loaderSubText">Conectando con la fuente de datos…</div>
</div>

<!-- ==================== ENCABEZADO ==================== -->
<header class="topbar">
  <div class="brand">
    <div class="brand-logo">HC</div>
    <div class="brand-text">
      <h1>HEEL Colombia</h1>
      <p>Torre de Control Operativa</p>
    </div>
  </div>
  <div class="topbar-right">
    <div class="date-block">
      <div class="d-main" id="fechaActual">--</div>
      <div class="d-sub">Última actualización: <span id="horaActualizacion">cargando…</span></div>
    </div>
    <div class="theme-toggle" id="themeToggle">
      <button data-theme-btn="light">🌞 Claro</button>
      <button data-theme-btn="dark">🌙 Oscuro</button>
    </div>
    <button class="btn btn-primary" id="btnActualizar">↻ Actualizar Datos</button>
  </div>
</header>

<!-- ==================== FILTROS ==================== -->
<div class="filters-bar">
  <div class="filters-grid">
    <div class="field"><label>Fecha inicial</label><input type="date" id="fFechaIni"></div>
    <div class="field"><label>Fecha final</label><input type="date" id="fFechaFin"></div>
    <div class="field"><label>Ciudad</label><select id="fCiudad"><option value="">Todas</option></select></div>
    <div class="field"><label>Punto de venta</label><select id="fPunto"><option value="">Todos</option></select></div>
    <div class="field"><label>Responsable</label><select id="fResponsable"><option value="">Todos</option></select></div>
    <div class="field"><label>Estado</label><select id="fEstado"><option value="">Todos</option></select></div>
    <div class="field"><label>Cumplimiento</label><select id="fCumplimiento"><option value="">Todos</option><option value="cumple">Cumple</option><option value="nocumple">No cumple</option></select></div>
    <div class="field"><label>Novedad</label><select id="fNovedad"><option value="">Todas</option></select></div>
    <div class="field"><label>Franja horaria</label><select id="fFranja"><option value="">Todas</option></select></div>
    <div class="field"><label>Tipo de negocio</label><select id="fTipoNegocio"><option value="">Todos</option></select></div>
    <div class="filters-actions">
      <button class="btn btn-primary btn-sm" id="btnAplicar">Aplicar</button>
      <button class="btn btn-sm" id="btnLimpiar">Limpiar</button>
    </div>
  </div>
</div>

<div class="app">
<div id="demoBannerHost"></div>
<main id="mainContent"></main>
<footer class="app-footer">HEEL Colombia · Torre de Control Operativa · Datos actualizados diariamente a las 09:00 AM</footer>
</div>

<script>
/* ==================================================================
   TORRE DE CONTROL OPERATIVA — HEEL COLOMBIA
   Lógica de aplicación (100% en memoria tras la carga inicial)
   ================================================================== */

/* ---------------------------------------------------------------
   1. CONFIGURACIÓN — reemplace estas URL por las de su Google Sheet
      publicado como CSV (Archivo > Compartir > Publicar en la Web
      > seleccionar la hoja > formato CSV).
   --------------------------------------------------------------- */
const CONFIG = {
  // URL del CSV de la hoja "DATA" (spreadsheet: SERVICIOS HEEL 2026).
  // Se usa el endpoint gviz/tq, que en la práctica soporta CORS para hojas
  // compartidas como "Cualquier persona con el enlace puede ver" (no requiere
  // publicación). Si tu hoja es privada, esto seguirá fallando y el dashboard
  // caerá automáticamente a datos de demostración.
  //
  // Alternativas si esta URL no funciona en tu navegador:
  //  a) Publicar oficialmente: Archivo → Compartir → Publicar en la Web → elige
  //     la hoja "DATA" → formato CSV → pega esa URL aquí (es la más confiable).
  //  b) Verifica que el Sheet tenga activado "Cualquier persona con el enlace" (Ver).

// Convierte una letra de columna (ej. "AD") a índice numérico base 0
function letraAIndice(letra){
  let idx = 0;
  for(let i=0;i<letra.length;i++){
    idx = idx*26 + (letra.charCodeAt(i) - 64);
  }
  return idx - 1;
}

// Normaliza texto: quita tildes, pasa a minúsculas y recorta espacios
function normalizarTexto(txt){
  if(txt === null || txt === undefined) return "";
  return String(txt)
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .toLowerCase().trim();
}

// Busca el índice de una columna por lista de nombres candidatos (comparación normalizada)
function buscarColumnaPorNombre(headers, candidatos){
  const normalizados = headers.map(normalizarTexto);
  for(const cand of candidatos){
    const nCand = normalizarTexto(cand);
    let idx = normalizados.findIndex(h => h === nCand);
    if(idx !== -1) return idx;
  }
  for(const cand of candidatos){
    const nCand = normalizarTexto(cand);
    let idx = normalizados.findIndex(h => h.includes(nCand));
    if(idx !== -1) return idx;
  }
  return -1;
}

function parseNumero(val){
  if(val === null || val === undefined || val === "") return null;
  const limpio = String(val).replace(/\./g,"").replace(",",".").replace(/[^0-9.\-]/g,"");
  const n = parseFloat(limpio.replace(/(?!^)-/g,""));
  return isNaN(n) ? null : n;
}

function parseNumeroSimple(val){
  if(val === null || val === undefined || val === "") return null;
  const bruto = String(val).trim();
  // Errores de fórmula de Google Sheets: nunca deben interpretarse como 0
  if(/^#(div\/0!?|n\/a|ref!?|value!?|name\?|null!?|num!?)$/i.test(bruto)) return null;
  let s = bruto.replace(/[^0-9.,\-]/g,"");
  if(s.indexOf(",") !== -1 && s.indexOf(".") !== -1){
    s = s.replace(/\./g,"").replace(",",".");
  } else if(s.indexOf(",") !== -1){
    s = s.replace(",",".");
  }
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

// Parser específico para montos en pesos colombianos (Costo, Ticket, Total general).
// Estos valores llegan desde gviz con el formato de moneda de la celda ya aplicado
// (ej. "$26,013"), donde la coma es SIEMPRE separador de miles — nunca decimal,
// porque no existen fracciones de peso en esta hoja. Tratarla como decimal (como
// hace parseNumeroSimple, pensado para números en convención es-CO) da resultados
// ~1000 veces menores a los reales.
function parseMonedaCOP(val){
  if(val === null || val === undefined || val === "") return null;
  const bruto = String(val).trim();
  if(/^#(div\/0!?|n\/a|ref!?|value!?|name\?|null!?|num!?)$/i.test(bruto)) return null;
  const negativo = bruto.startsWith('-');
  const soloDigitos = bruto.replace(/[^0-9]/g,"");
  if(!soloDigitos) return null;
  const n = parseInt(soloDigitos, 10);
  if(isNaN(n)) return null;
  return negativo ? -n : n;
}

const MESES_ES = { enero:1, febrero:2, marzo:3, abril:4, mayo:5, junio:6, julio:7,
  agosto:8, septiembre:9, setiembre:9, octubre:10, noviembre:11, diciembre:12 };

// La columna "MES DATA" trae el nombre del mes en texto (ENERO, FEBRERO...),
// generado a partir de la fecha real y por lo tanto inequívoco. Se usa como
// referencia de verdad: si la fecha interpretada (M/D o D/M, ambiguo cuando el
// día es <=12) no coincide con ese mes, se invierte día/mes para reconciliarla.
function resolverFechaConReferenciaDeMes(valorFecha, valorMesTexto){
  const fechaBase = parseFechaFlexible(valorFecha);
  if(!fechaBase) return null;
  const mesEsperado = MESES_ES[normalizarTexto(valorMesTexto)];
  if(!mesEsperado) return fechaBase;
  if(fechaBase.getMonth()+1 === mesEsperado) return fechaBase;
  const dia = fechaBase.getDate(), mes = fechaBase.getMonth()+1, anio = fechaBase.getFullYear();
  if(mes >= 1 && mes <= 12){
    const alterna = new Date(anio, dia-1, mes);
    if(!isNaN(alterna.getTime()) && alterna.getMonth()+1 === mesEsperado) return alterna;
  }
  return fechaBase; // no se pudo reconciliar automáticamente, se deja como estaba
}

function parseFechaFlexible(val){
  if(!val) return null;
  const s = String(val).trim();

  // Formato propio del endpoint gviz/tq de Google Sheets para columnas de tipo
  // Fecha real: "Date(2026,0,2)" o "Date(2026,0,2,13,20,0)" — el mes viene en base 0.
  let g = s.match(/^Date\((\d{4}),\s*(\d{1,2}),\s*(\d{1,2})(?:,\s*(\d{1,2}),\s*(\d{1,2}),\s*(\d{1,2}))?\)$/);
  if(g){
    const y = parseInt(g[1],10), mes0 = parseInt(g[2],10), dia = parseInt(g[3],10);
    const fecha = new Date(y, mes0, dia);
    if(!isNaN(fecha.getTime())) return fecha;
  }

  // El sheet real usa formato M/D/AAAA (mes primero, estilo usado por el sistema de origen)
  let m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(m){
    let p1 = parseInt(m[1],10), p2 = parseInt(m[2],10), y = parseInt(m[3],10);
    if(y < 100) y += 2000;
    let mes = p1, dia = p2;
    if(mes > 12 && dia <= 12){ const tmp = mes; mes = dia; dia = tmp; } // corrige si el mes resulta inválido
    const fecha = new Date(y, mes-1, dia);
    if(!isNaN(fecha.getTime())) return fecha;
  }
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m){
    const fecha = new Date(parseInt(m[1],10), parseInt(m[2],10)-1, parseInt(m[3],10));
    if(!isNaN(fecha.getTime())) return fecha;
  }
  const nativa = new Date(s);
  if(!isNaN(nativa.getTime())) return nativa;
  return null;
}

// Convierte duraciones en formato H:MM:SS (columna TIEMPO ENTREGA) a minutos totales
function parseDuracionMinutos(val){
  if(val === null || val === undefined || val === "") return null;
  const s = String(val).trim();

  // gviz/tq envuelve las columnas formateadas como "Hora" con el mismo wrapper
  // Date(AAAA,M,D,H,Mi,S) — solo interesan las tres últimas partes (hora/min/seg).
  const g = s.match(/^Date\((\d{4}),\s*(\d{1,2}),\s*(\d{1,2}),\s*(\d{1,2}),\s*(\d{1,2}),\s*(\d{1,2})\)$/);
  if(g){
    const h = parseInt(g[4],10), m = parseInt(g[5],10), sec = parseInt(g[6],10);
    return h*60 + m + sec/60;
  }

  const partes = s.split(':').map(p=>p.trim());
  if(partes.length === 3){
    const h = parseFloat(partes[0].replace(',','.'));
    const m = parseFloat(partes[1].replace(',','.'));
    const sec = parseFloat(partes[2].replace(',','.'));
    if(isNaN(h)||isNaN(m)||isNaN(sec)) return null;
    return h*60 + m + sec/60;
  }
  if(partes.length === 2){
    const m = parseFloat(partes[0].replace(',','.'));
    const sec = parseFloat(partes[1].replace(',','.'));
    if(isNaN(m)||isNaN(sec)) return null;
    return m + sec/60;
  }
  return parseNumeroSimple(val);
}

// Convierte coordenadas geográficas que pueden venir en distintos formatos:
// decimal normal (-74.119197), decimal con coma (-74,119197) o con comas de
// agrupación por formato de celda (-75,558,963,919 => -75.558963919)
function parseCoordenada(val, esLongitud){
  if(val === null || val === undefined || val === "") return null;
  const s = String(val).trim();
  if(!s) return null;
  const negativo = s.startsWith('-');
  const numPuntos = (s.match(/\./g)||[]).length;
  let resultado = null;

  if(numPuntos >= 1){
    // Ya tiene un punto decimal explícito: se descartan solo las comas de agrupación
    resultado = parseFloat(s.replace(/,/g,''));
  } else if((s.match(/,/g)||[]).length === 0){
    resultado = parseFloat(s);
  } else {
    // Una o más comas sin punto decimal: son separadores de agrupación de celda
    // (ej. "-75,558,963,919" o "459,387"). Se descartan y se reescala al rango geográfico.
    const soloDigitos = s.replace(/[^0-9]/g,'');
    if(!soloDigitos) return null;
    let n = parseInt(soloDigitos, 10);
    const limite = esLongitud ? 85 : 15;
    let iteraciones = 0;
    while(Math.abs(n) > limite && n !== 0 && iteraciones < 15){ n = n/10; iteraciones++; }
    resultado = negativo ? -Math.abs(n) : n;
  }
  if(resultado === null || isNaN(resultado)) return null;
  if(resultado === 0) return null; // 0,0 se usa como marcador de coordenada ausente
  return resultado;
}

function esCumplido(valor, estadoValor){
  const n = normalizarTexto(valor);
  if(["cumple","si","sí","1","true","ok","cumplido","a tiempo","dentro de tiempo"].includes(n)) return true;
  if(["no cumple","no","0","false","incumple","fuera de tiempo","no cumplido"].includes(n)) return false;
  const nEstado = normalizarTexto(estadoValor);
  if(nEstado.includes("cumpl")) return !nEstado.includes("no cumpl") && !nEstado.includes("incump");
  return null;
}

function esNovedadValida(valor){
  const n = normalizarTexto(valor);
  if(!n) return false;
  if(["ninguna","n/a","na","no aplica","sin novedad","-","ninguno","#n/d","n/d","nd"].includes(n)) return false;
  return true;
}

function formatoNumero(n, decimales=0){
  if(n === null || n === undefined || isNaN(n)) return "N/D";
  return n.toLocaleString("es-CO", {minimumFractionDigits:decimales, maximumFractionDigits:decimales});
}
function formatoPct(n, decimales=1){
  if(n === null || n === undefined || isNaN(n)) return "N/D";
  return n.toLocaleString("es-CO",{minimumFractionDigits:decimales, maximumFractionDigits:decimales}) + "%";
}
function formatoMoneda(n){
  if(n === null || n === undefined || isNaN(n)) return "N/D";
  return "$" + n.toLocaleString("es-CO",{maximumFractionDigits:0});
}
function formatoFecha(d){
  if(!d) return "N/D";
  return d.toLocaleDateString("es-CO",{day:"2-digit", month:"2-digit", year:"numeric"});
}

function haversineKm(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function debounce(fn, ms){
  let t;
  return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), ms); };
}

function setLoaderProgress(pct, texto){
  const fill = document.getElementById('loaderBarFill');
  const sub = document.getElementById('loaderSubText');
  if(fill) fill.style.width = pct + "%";
  if(sub && texto) sub.textContent = texto;
}

function normalizarFilasData(headers, filasCrudas){
  const idx = {
    fecha: buscarColumnaPorNombre(headers, ["fecha_entrega","fecha entrega","fecha de servicio","fecha servicio","fecha"]),
    fechaCreacion: buscarColumnaPorNombre(headers, ["fecha_creacion","fecha creacion","fecha creación"]),
    guia: buscarColumnaPorNombre(headers, ["guia","guía","numero de guia","no guia"]),
    ciudad: buscarColumnaPorNombre(headers, ["ciudad"]),
    punto: buscarColumnaPorNombre(headers, ["punto_venta","punto de venta","punto","pdv"]),
    estado: buscarColumnaPorNombre(headers, ["estado","estado del servicio"]),
    cumplimiento: buscarColumnaPorNombre(headers, ["cumplimiento","cumple"]),
    tiempo: buscarColumnaPorNombre(headers, ["tiempo entrega","tiempo_entrega","tiempo de entrega","tiempo promedio","tiempo (min)","tiempo"]),
    tipoNegocio: buscarColumnaPorNombre(headers, ["tipo_negocio","tipo negocio","tipo de negocio"]),
    mesData: buscarColumnaPorNombre(headers, ["mes data","mes_data"]),
  };
  // Columnas garantizadas por posición según especificación del proyecto (se resuelven
  // primero por nombre real de encabezado y, si no existe, caen a la letra especificada)
  const idxLon = buscarColumnaPorNombre(headers, ["longitud","lon","long","cx"]);
  const idxLat = buscarColumnaPorNombre(headers, ["latitud","lat","cy"]);
  const idxFranja = buscarColumnaPorNombre(headers, ["franja horaria","franja_horaria","franja"]);
  const idxResp = buscarColumnaPorNombre(headers, ["responsable","mensajero","transportador"]);
  const idxNov = buscarColumnaPorNombre(headers, ["novedad"]);

  idx.lon = idxLon !== -1 ? idxLon : letraAIndice("AD");
  idx.lat = idxLat !== -1 ? idxLat : letraAIndice("AE");
  idx.franja = idxFranja !== -1 ? idxFranja : letraAIndice("AK");
  idx.responsable = idxResp !== -1 ? idxResp : letraAIndice("AL");
  idx.novedad = idxNov !== -1 ? idxNov : letraAIndice("AM");
  // Motivo y responsable REALES del incumplimiento (columnas AL y AM del sheet real:
  // "NOVEDAD CUMPLIMIENTO" y "RESPONSABLE" -categoría de causa raíz, ej. CALL/CLIENTE/
  // HEEL/QUICK/FACTOR EXTERNO- distintas del mensajero de la columna M). Se resuelven
  // por posición porque el encabezado "RESPONSABLE" se repite también en la columna M.
  idx.motivoIncumplimiento = letraAIndice("AL");
  idx.responsableIncumplimiento = letraAIndice("AM");

  // Contadores de diagnóstico (se exponen en la validación de consola)
  let totalFilas = 0, sinFechaEntrega = 0, recuperadasPorFechaCreacion = 0, sinFechaAlguna = 0;

  const filas = [];
  for(const fila of filasCrudas){
    if(!fila || fila.every(c => c === "" || c === undefined || c === null)) continue;
    totalFilas++;
    const get = (i) => (i !== -1 && i < fila.length) ? fila[i] : "";
    let fecha = resolverFechaConReferenciaDeMes(get(idx.fecha), get(idx.mesData));
    let fechaEsAproximada = false;
    if(!fecha){
      sinFechaEntrega++;
      // Pedidos sin fecha de entrega (ej. cancelados o aún no cerrados) igual deben
      // aparecer en las gráficas de línea de tiempo: se usa la fecha de creación
      // del pedido como respaldo en vez de descartar el registro por completo.
      fecha = parseFechaFlexible(get(idx.fechaCreacion));
      if(fecha){ recuperadasPorFechaCreacion++; fechaEsAproximada = true; }
      else { sinFechaAlguna++; }
    }
    const estado = String(get(idx.estado) || "").trim();
    const cumpleRaw = get(idx.cumplimiento);
    const lat = parseCoordenada(get(idx.lat), false);
    const lon = parseCoordenada(get(idx.lon), true);
    const tiempo = parseDuracionMinutos(get(idx.tiempo));

    filas.push({
      fecha, fechaTexto: fecha ? formatoFecha(fecha) + (fechaEsAproximada ? " (fecha de creación)" : "") : "",
      fechaEsAproximada,
      guia: String(get(idx.guia) || "").trim(),
      ciudad: String(get(idx.ciudad) || "").trim(),
      punto: String(get(idx.punto) || "").trim(),
      responsable: String(get(idx.responsable) || "").trim(),
      estado,
      cumple: esCumplido(cumpleRaw, estado),
      novedad: String(get(idx.novedad) || "").trim(),
      tiempo,
      franja: String(get(idx.franja) || "").trim(),
      tipoNegocio: String(get(idx.tipoNegocio) || "").trim(),
      motivoIncumplimiento: String(get(idx.motivoIncumplimiento) || "").trim(),
      responsableIncumplimiento: String(get(idx.responsableIncumplimiento) || "").trim(),
      lat, lon
    });
  }
  console.log(`Diagnóstico de fechas — filas totales: ${totalFilas}, sin fecha_entrega: ${sinFechaEntrega} (recuperadas con fecha_creación: ${recuperadasPorFechaCreacion}, sin ninguna fecha: ${sinFechaAlguna})`);
  return filas;
}

const MESES_PROMO = [
  {nombre:"ENERO", num:1}, {nombre:"FEBRERO", num:2}, {nombre:"MARZO", num:3},
  {nombre:"ABRIL", num:4}, {nombre:"MAYO", num:5}, {nombre:"JUNIO", num:6},
  {nombre:"JULIO", num:7}, {nombre:"AGOSTO", num:8}, {nombre:"SEPTIEMBRE", num:9},
  {nombre:"OCTUBRE", num:10}, {nombre:"NOVIEMBRE", num:11}, {nombre:"DICIEMBRE", num:12}
];

// La hoja "PROMOCIÓN DE ENTRADAS" viene en formato ANCHO: una fila por punto de
// venta, con un par de columnas (volumen, ticket) por cada mes del año, además
// de Mensajeros y Costo por punto. Se pivotea a formato largo para el análisis
// mensual, y se conserva también el resumen ancho para el módulo de Per Cápita.
function normalizarFilasPromo(headers, filasCrudas){
  const idx = {
    clasificacion: buscarColumnaPorNombre(headers, ["clasificacion","clasificación"]),
    punto: buscarColumnaPorNombre(headers, ["punto de venta","punto_venta","punto"]),
    ciudad: buscarColumnaPorNombre(headers, ["ciudad"]),
    mensajeros: buscarColumnaPorNombre(headers, ["mensajeros"]),
    costo: buscarColumnaPorNombre(headers, ["costo"]),
    totalGeneral: buscarColumnaPorNombre(headers, ["total general"]),
    ticketAnual: buscarColumnaPorNombre(headers, ["ticket promedio anual","ticket anual"]),
  };
  const idxMeses = MESES_PROMO.map(m => ({
    ...m,
    idxVolumen: buscarColumnaPorNombre(headers, [m.nombre]),
    idxTicket: buscarColumnaPorNombre(headers, ["ticket " + m.nombre.toLowerCase()])
  }));

  const largo = [];   // una fila por punto x mes, para gráficos y rankings mensuales
  const resumen = [];  // una fila por punto, con mensajeros/costo/total/ticket anual

  for(const fila of filasCrudas){
    if(!fila || fila.every(c => c === "" || c === undefined || c === null)) continue;
    const get = (i) => (i !== -1 && i < fila.length) ? fila[i] : "";
    const punto = String(get(idx.punto) || "").trim();
    if(!punto) continue;
    const ciudad = String(get(idx.ciudad) || "").trim();
    const mensajeros = parseNumeroSimple(get(idx.mensajeros));
    const costo = parseMonedaCOP(get(idx.costo));
    const totalGeneral = parseMonedaCOP(get(idx.totalGeneral));
    const ticketAnual = parseMonedaCOP(get(idx.ticketAnual));

    idxMeses.forEach(m=>{
      const volumen = parseMonedaCOP(get(m.idxVolumen));
      const ticket = parseMonedaCOP(get(m.idxTicket)); // #DIV/0! o vacío -> null
      if(ticket !== null){
        largo.push({ punto, ciudad, mes:m.num, anio:CONFIG.ANIO_PROMO, ticket, volumen });
      }
    });

    resumen.push({
      punto, ciudad,
      clasificacion: String(get(idx.clasificacion) || "").trim(),
      mensajeros, costo, totalGeneral, ticketAnual,
      costoPorServicio: (costo!==null && totalGeneral) ? costo/totalGeneral : null
    });
  }
  return { largo, resumen };
}

function descargarCSV(url, timeoutMs = 9000, exigirFilas = true){
  return new Promise((resolve, reject)=>{
    if(!url){ reject(new Error("URL vacía")); return; }
    let finalizado = false;
    const temporizador = setTimeout(()=>{
      if(finalizado) return;
      finalizado = true;
      reject(new Error("Tiempo de espera agotado descargando el CSV (posible bloqueo CORS o URL privada)"));
    }, timeoutMs);

    Papa.parse(url, {
      download:true,
      skipEmptyLines:true,
      complete: (res) => {
        if(finalizado) return;
        finalizado = true;
        clearTimeout(temporizador);
        // Si Google redirige a una página de login o de error, el contenido descargado
        // es HTML en vez de CSV: se detecta y se rechaza para no mostrar datos basura.
        const primeraFila = (res.data && res.data[0]) ? res.data[0].join(" ") : "";
        const pareceHTML = /<!doctype|<html|accounts\.google\.com/i.test(primeraFila);
        const minimo = exigirFilas ? 2 : 1;
        if(pareceHTML || !res.data || res.data.length < minimo){
          reject(new Error("El contenido recibido no es un CSV válido (revisa permisos para compartir del Google Sheet)"));
          return;
        }
        resolve(res.data);
      },
      error: (err) => {
        if(finalizado) return;
        finalizado = true;
        clearTimeout(temporizador);
        reject(err);
      }
    });
  });
}

// Google (gviz) puede truncar en silencio la respuesta de hojas muy grandes o con
// muchas columnas calculadas (la hoja DATA tiene ~40 columnas, varias con fórmulas),
// devolviendo solo una parte de las filas sin ningún error visible. Esta función
// detecta ese corte y completa la descarga pidiendo páginas adicionales con
// OFFSET hasta agotar los datos reales.
async function descargarCSVCompleto(url, avisoProgreso){
  const primera = await descargarCSV(url);
  const headers = primera[0];
  let datos = primera.slice(1);
  const TAMANO_PAGINA_REFERENCIA = datos.length; // tamaño del primer bloque recibido
  let offset = datos.length;
  let intentos = 0;
  const MAX_INTENTOS = 40;
  const MAX_FILAS_TOTAL = 500000;

  // Solo se intenta paginar si el primer bloque vino "lleno" (indicio de corte);
  // si el sheet es pequeño y trajo todo de una vez, no hace falta seguir pidiendo.
  let seguir = TAMANO_PAGINA_REFERENCIA >= 1000;

  while(seguir && intentos < MAX_INTENTOS && datos.length < MAX_FILAS_TOTAL){
    intentos++;
    if(avisoProgreso) avisoProgreso(offset);
    const separador = url.includes('?') ? '&' : '?';
    const consulta = encodeURIComponent(`select * offset ${offset}`);
    const urlPagina = `${url}${separador}tq=${consulta}`;
    let pagina;
    try{
      pagina = await descargarCSV(urlPagina, 9000, false);
    }catch(err){
      console.warn(`No se pudo traer la página adicional del CSV (offset ${offset}):`, err.message || err);
      break;
    }
    if(!pagina || pagina.length <= 1){ break; } // solo encabezado o vacío: no hay más datos

    // La página de continuación repite la fila de encabezado como primera fila
    // (comportamiento estándar de gviz para consultas "select"); se descarta.
    const filasPagina = pagina.slice(1);
    if(!filasPagina.length){ break; }

    datos = datos.concat(filasPagina);
    offset += filasPagina.length;
    seguir = filasPagina.length >= Math.max(500, TAMANO_PAGINA_REFERENCIA * 0.3);
  }
  return [headers, ...datos];
}

async function cargarDatos(){
  setLoaderProgress(10, "Conectando con el Google Sheet…");
  STATE.errorCarga = null;
  try{
    if(!CONFIG.CSV_URL_DATA) throw new Error("Sin URL configurada en CONFIG.CSV_URL_DATA");
    const crudasData = await descargarCSVCompleto(CONFIG.CSV_URL_DATA, (offset)=>{
      setLoaderProgress(30, `Descargando registros adicionales (${formatoNumero(offset)} hasta ahora)…`);
    });
    console.log(`CSV DATA descargado: ${crudasData.length - 1} filas de datos (más encabezado)`);
    setLoaderProgress(45, "Procesando hoja DATA…");
    const headersData = crudasData[0];

    // Validación mínima: si no se reconoce ninguna columna clave, probablemente
    // se descargó el archivo equivocado (HTML de login, hoja vacía, etc.)
    const tieneEstado = buscarColumnaPorNombre(headersData, ["estado"]) !== -1;
    const tieneGuia = buscarColumnaPorNombre(headersData, ["guia","guía"]) !== -1;
    if(!tieneEstado && !tieneGuia){
      throw new Error("No se reconocieron las columnas esperadas (estado/guía) en el CSV descargado");
    }

    STATE.data = normalizarFilasData(headersData, crudasData.slice(1));
    if(STATE.data.length === 0){
      throw new Error("La hoja DATA se descargó pero no contiene filas de servicios válidas");
    }

    setLoaderProgress(65, "Procesando hoja PROMOCIÓN DE ENTRADAS…");
    let promoLargo = [], promoResumen = [];
    if(CONFIG.CSV_URL_PROMO){
      const crudasPromo = await descargarCSV(CONFIG.CSV_URL_PROMO);
      const resultado = normalizarFilasPromo(crudasPromo[0], crudasPromo.slice(1));
      promoLargo = resultado.largo;
      promoResumen = resultado.resumen;
    }
    STATE.promo = promoLargo;
    STATE.promoResumen = promoResumen;
    STATE.isDemo = false;
  }catch(err){
    console.warn("No se pudo cargar el CSV real, se usan datos de demostración:", err.message || err);
    setLoaderProgress(45, "Fuente no disponible, generando datos de demostración…");
    STATE.errorCarga = (err && err.message) ? err.message : String(err);
    STATE.data = generarDatosDemo();
    const demoPromo = generarPromoDemo();
    STATE.promo = demoPromo.largo;
    STATE.promoResumen = demoPromo.resumen;
    STATE.isDemo = true;
  }
  setLoaderProgress(90, "Preparando visualización…");
}

function poblarSelect(id, valores){
  const sel = document.getElementById(id);
  const actual = sel.value;
  const primeraOpcion = sel.querySelector('option').outerHTML;
  const unicos = [...new Set(valores.filter(v=>v && v.trim() !== ""))].sort((a,b)=>a.localeCompare(b,'es'));
  sel.innerHTML = primeraOpcion + unicos.map(v=>`<option value="${v.replace(/"/g,'&quot;')}">${v}</option>`).join('');
  if(unicos.includes(actual)) sel.value = actual;
}

function poblarFiltros(){
  poblarSelect('fCiudad', STATE.data.map(d=>d.ciudad));
  poblarSelect('fPunto', STATE.data.map(d=>d.punto));
  poblarSelect('fResponsable', STATE.data.map(d=>d.responsable));
  poblarSelect('fEstado', STATE.data.map(d=>d.estado));
  poblarSelect('fNovedad', STATE.data.map(d=>d.novedad).filter(esNovedadValida));
  poblarSelect('fFranja', STATE.data.map(d=>d.franja));
  poblarSelect('fTipoNegocio', STATE.data.map(d=>d.tipoNegocio));

  const fechasValidas = STATE.data.map(d=>d.fecha).filter(Boolean);
  if(fechasValidas.length){

    const max = new Date(Math.max(...fechasValidas));

    document.getElementById('fFechaFin').value = toInputDate(max);
  }

  citySelect.innerHTML = '<option value="">Seleccione una ciudad…</option>' + ciudadesUnicas.map(c=>`<option value="${c}">${c}</option>`).join('');
}

function toInputDate(d){
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function leerFiltrosActuales(){
  return {
    fechaIni: document.getElementById('fFechaIni').value ? new Date(document.getElementById('fFechaIni').value + 'T00:00:00') : null,
    fechaFin: document.getElementById('fFechaFin').value ? new Date(document.getElementById('fFechaFin').value + 'T23:59:59') : null,
    ciudad: document.getElementById('fCiudad').value,
    punto: document.getElementById('fPunto').value,
    responsable: document.getElementById('fResponsable').value,
    estado: document.getElementById('fEstado').value,
    cumplimiento: document.getElementById('fCumplimiento').value,
    novedad: document.getElementById('fNovedad').value,
    franja: document.getElementById('fFranja').value,
    tipoNegocio: document.getElementById('fTipoNegocio').value
  };
}

function coincideFiltros(fila, f){
  if(f.fechaIni && fila.fecha && fila.fecha < f.fechaIni) return false;
  if(f.fechaFin && fila.fecha && fila.fecha > f.fechaFin) return false;
  if(f.ciudad && fila.ciudad !== f.ciudad) return false;
  if(f.punto && fila.punto !== f.punto) return false;
  if(f.responsable && fila.responsable !== f.responsable) return false;
  if(f.estado && fila.estado !== f.estado) return false;
  if(f.cumplimiento === 'cumple' && fila.cumple !== true) return false;
  if(f.cumplimiento === 'nocumple' && fila.cumple !== false) return false;
  if(f.novedad && fila.novedad !== f.novedad) return false;
  if(f.franja && fila.franja !== f.franja) return false;
  if(f.tipoNegocio && fila.tipoNegocio !== f.tipoNegocio) return false;
  return true;
}

// Calcula el rango de fechas del período inmediatamente anterior y de igual
// duración al seleccionado (ej. si el filtro es todo marzo, devuelve todo
// febrero). Se reutiliza tanto para las métricas de DATA como para el
// Ticket Promedio, de modo que ambos respeten el mismo período de comparación.
function calcularRangoPeriodoAnterior(f){
  if(!f.fechaIni || !f.fechaFin) return null;
  const duracionMs = f.fechaFin - f.fechaIni;
  const finAnterior = new Date(f.fechaIni.getTime() - 1);
  const iniAnterior = new Date(f.fechaIni.getTime() - duracionMs - 1);
  return { fechaIni: iniAnterior, fechaFin: finAnterior };
}

function calcularPeriodoAnterior(f){
  const rango = calcularRangoPeriodoAnterior(f);
  if(!rango) return [];
  return STATE.data.filter(fila => {
    if(!fila.fecha) return false;
    if(fila.fecha < rango.fechaIni || fila.fecha > rango.fechaFin) return false;
    const fSinFecha = {...f, fechaIni:null, fechaFin:null};
    return coincideFiltros(fila, fSinFecha);
  });
}

function aplicarFiltros(){
  const f = leerFiltrosActuales();
  STATE.filtered = STATE.data.filter(fila => coincideFiltros(fila, f));
  STATE.previousPeriod = calcularPeriodoAnterior(f);
  STATE.tableState.page = 1;
  renderizarTodo();
}

function limpiarFiltros(){
  document.getElementById('fCiudad').value = "";
  document.getElementById('fPunto').value = "";
  document.getElementById('fResponsable').value = "";
  document.getElementById('fEstado').value = "";
  document.getElementById('fCumplimiento').value = "";
  document.getElementById('fNovedad').value = "";
  document.getElementById('fFranja').value = "";
  document.getElementById('fTipoNegocio').value = "";
  const fechasValidas = STATE.data.map(d=>d.fecha).filter(Boolean);
  if(fechasValidas.length){
    document.getElementById('fFechaIni').value = toInputDate(new Date(Math.min(...fechasValidas)));
    document.getElementById('fFechaFin').value = toInputDate(new Date(Math.max(...fechasValidas)));
  }
  aplicarFiltros();
}

/* ---------------------------------------------------------------
   8. MOTOR DE MÉTRICAS
   --------------------------------------------------------------- */
function calcularMetricas(filas){
  const total = filas.length;
  const entregados = filas.filter(f=>normalizarTexto(f.estado).includes('entreg')).length;
  const cerradosNovedad = filas.filter(f=>normalizarTexto(f.estado).includes('novedad')).length;
  const cancelados = filas.filter(f=>normalizarTexto(f.estado).includes('cancel')).length;
  const conCumpleDefinido = filas.filter(f=>f.cumple !== null);
  const cumplen = conCumpleDefinido.filter(f=>f.cumple === true).length;
  const cumplimiento = conCumpleDefinido.length ? (cumplen/conCumpleDefinido.length*100) : null;
  const efectividad = total ? (entregados/total*100) : null;
  const tiempos = filas.map(f=>f.tiempo).filter(t=>t !== null && t !== undefined && !isNaN(t));
  const tiempoProm = tiempos.length ? tiempos.reduce((a,b)=>a+b,0)/tiempos.length : null;
  const novedadesCount = filas.filter(f=>esNovedadValida(f.novedad)).length;
  const ciudadesActivas = new Set(filas.map(f=>f.ciudad).filter(Boolean)).size;
  const puntosActivos = new Set(filas.map(f=>f.punto).filter(Boolean)).size;
  return { total, entregados, cerradosNovedad, cancelados, cumplimiento, efectividad, tiempoProm, novedadesCount, ciudadesActivas, puntosActivos };
}

// Determina si el mes/año de un registro de Promoción de Entradas cae dentro
// del rango de fechas seleccionado en los filtros (comparando por mes calendario,
// ya que esa hoja solo trae granularidad mensual, no por día).
function mesEnRango(anio, mes, fechaIni, fechaFin){
  if(anio == null || mes == null) return true; // sin período conocido: se conserva
  const inicioMes = new Date(anio, mes-1, 1);
  const finMes = new Date(anio, mes, 0, 23, 59, 59);
  if(fechaIni && finMes < fechaIni) return false;
  if(fechaFin && inicioMes > fechaFin) return false;
  return true;
}

function calcularTicketPromedio(promoFilas, filtros){
  let subset = promoFilas;
  if(filtros && filtros.ciudad) subset = subset.filter(p=>normalizarTexto(p.ciudad) === normalizarTexto(filtros.ciudad));
  if(filtros && filtros.punto) subset = subset.filter(p=>normalizarTexto(p.punto) === normalizarTexto(filtros.punto));
  if(filtros && (filtros.fechaIni || filtros.fechaFin)){
    subset = subset.filter(p=>mesEnRango(p.anio, p.mes, filtros.fechaIni, filtros.fechaFin));
  }
  const validos = subset.map(p=>p.ticket).filter(t=>t !== null && t !== undefined && !isNaN(t));
  return validos.length ? validos.reduce((a,b)=>a+b,0)/validos.length : null;
}

function calcularVariacion(actual, anterior){
  if(actual === null || anterior === null || anterior === undefined || anterior === 0) return null;
  return ((actual-anterior)/Math.abs(anterior))*100;
}

function calcularIndiceOperativo(m){
  const scoreCumplimiento = m.cumplimiento ?? 0;
  const scoreEfectividad = m.efectividad ?? 0;
  let scoreTiempo = 0;
  if(m.tiempoProm !== null){
    scoreTiempo = Math.max(0, Math.min(100, 100 - ((m.tiempoProm - CONFIG.META_TIEMPO_MINUTOS) / CONFIG.META_TIEMPO_MINUTOS * 100)));
  }
  const pctNovedades = m.total ? (m.novedadesCount/m.total*100) : 0;
  const scoreNovedades = Math.max(0, 100 - pctNovedades*4);
  const ticketProm = calcularTicketPromedio(STATE.promo, {});
  const ticketActual = calcularTicketPromedio(STATE.promo, leerFiltrosActuales());
  let scoreTicket = 60;
  if(ticketProm && ticketActual){
    scoreTicket = Math.max(0, Math.min(100, 50 + ((ticketActual-ticketProm)/ticketProm*100)));
  }
  const indice = (scoreCumplimiento*0.30 + scoreEfectividad*0.25 + scoreTiempo*0.20 + scoreNovedades*0.15 + scoreTicket*0.10);
  return {
    total: Math.round(Math.max(0,Math.min(100,indice))),
    partes: {
      cumplimiento: Math.round(scoreCumplimiento), efectividad: Math.round(scoreEfectividad),
      tiempo: Math.round(scoreTiempo), novedades: Math.round(scoreNovedades), ticket: Math.round(scoreTicket)
    }
  };
}

function agregarPor(filas, campo){
  const grupos = new Map();
  filas.forEach(f=>{
    const key = f[campo] || "Sin dato";
    if(!grupos.has(key)) grupos.set(key, []);
    grupos.get(key).push(f);
  });
  const resultado = [];
  grupos.forEach((subset, key)=>{
    const m = calcularMetricas(subset);
    resultado.push({ nombre:key, ...m });
  });
  return resultado;
}

/* ---------------------------------------------------------------
   9. RENDER — MÓDULO 1: RESUMEN EJECUTIVO
   --------------------------------------------------------------- */
function iconoSemaforo(valor, bueno, medio){
  if(valor === null || valor === undefined) return 'gray';
  if(valor >= bueno) return 'green';
  if(valor >= medio) return 'yellow';
  return 'red';
}

function renderKPIs(){
  const m = calcularMetricas(STATE.filtered);
  const mAnt = calcularMetricas(STATE.previousPeriod);
  const f = leerFiltrosActuales();
  const ticketActual = calcularTicketPromedio(STATE.promo, f);
  const rangoAnterior = calcularRangoPeriodoAnterior(f);
  const ticketAnterior = rangoAnterior
    ? calcularTicketPromedio(STATE.promo, {...f, fechaIni: rangoAnterior.fechaIni, fechaFin: rangoAnterior.fechaFin})
    : null;

  const tarjetas = [
    { label:"Total servicios", valor:formatoNumero(m.total), icon:"📦", color:"info", delta:calcularVariacion(m.total, mAnt.total) },
    { label:"Entregados", valor:formatoNumero(m.entregados), icon:"✅", color:"success", delta:calcularVariacion(m.entregados, mAnt.entregados) },
    { label:"Cerrados con novedad", valor:formatoNumero(m.cerradosNovedad), icon:"⚠️", color:"warning", delta:calcularVariacion(m.cerradosNovedad, mAnt.cerradosNovedad), invertido:true },
    { label:"Cancelados", valor:formatoNumero(m.cancelados), icon:"🚫", color:"danger", delta:calcularVariacion(m.cancelados, mAnt.cancelados), invertido:true },
    { label:"Cumplimiento", valor:formatoPct(m.cumplimiento), icon:"🎯", color:"info", delta:calcularVariacion(m.cumplimiento, mAnt.cumplimiento) },
    { label:"Efectividad", valor:formatoPct(m.efectividad), icon:"📈", color:"success", delta:calcularVariacion(m.efectividad, mAnt.efectividad) },
    { label:"Tiempo promedio", valor:(m.tiempoProm!==null? formatoNumero(m.tiempoProm,0)+" min":"N/D"), icon:"⏱️", color:"warning", delta:calcularVariacion(m.tiempoProm, mAnt.tiempoProm), invertido:true },
    { label:"Ticket promedio", valor:formatoMoneda(ticketActual), icon:"💳", color:"info", delta:calcularVariacion(ticketActual, ticketAnterior) },
    { label:"Ciudades activas", valor:formatoNumero(m.ciudadesActivas), icon:"🏙️", color:"info", delta:null },
    { label:"Puntos activos", valor:formatoNumero(m.puntosActivos), icon:"🏬", color:"info", delta:null }
  ];

  document.getElementById('kpiGrid').innerHTML = tarjetas.map(t=>{
    let deltaHtml = '<span class="kpi-delta flat">— sin comparación</span>';
    if(t.delta !== null && t.delta !== undefined && !isNaN(t.delta)){
      const positivo = t.invertido ? t.delta < 0 : t.delta > 0;
      const clase = t.delta === 0 ? 'flat' : (positivo ? 'up' : 'down');
      const flecha = t.delta === 0 ? '→' : (positivo ? '▲' : '▼');
      deltaHtml = `<span class="kpi-delta ${clase}">${flecha} ${formatoPct(Math.abs(t.delta),1)}</span>`;
    }
    return `
      <div class="card kpi-card hoverable">
        <div class="kpi-top">
          <span class="kpi-label">${t.label}</span>
          <div class="kpi-icon" style="background:var(--${t.color}-bg); color:var(--${t.color});">${t.icon}</div>
        </div>
        <div class="kpi-value">${t.valor}</div>
        ${deltaHtml}
      </div>`;
  }).join('');
}

/* ---------------------------------------------------------------
   10. RENDER — MÓDULO 2: ÍNDICE OPERATIVO (GAUGE)
   --------------------------------------------------------------- */
function dibujarGauge(score){
  const cx=150, cy=150, r=110;
  const anguloInicio = 180, anguloFin = 0;
  const anguloScore = 180 - (score/100*180);
  const rad = (deg)=> (deg*Math.PI/180);
  const puntoArco = (angDeg, radio)=>{
    const rad2 = angDeg*Math.PI/180;
    return [cx - radio*Math.cos(rad2), cy - radio*Math.sin(rad2)];
  };
  const [nx, ny] = puntoArco(anguloScore, r-18);
  const color = score >= 70 ? 'var(--success)' : (score >= 40 ? 'var(--warning)' : 'var(--danger)');

  const zonas = [
    {desde:180, hasta:180-72, color:'var(--danger)'},
    {desde:180-72, hasta:180-144, color:'var(--warning)'},
    {desde:180-144, hasta:0, color:'var(--success)'}
  ];
  const arcos = zonas.map(z=>{
    const [x1,y1] = puntoArco(z.desde, r);
    const [x2,y2] = puntoArco(z.hasta, r);
    const largo = (z.desde - z.hasta) > 180 ? 1 : 0;
    return `<path d="M ${x1} ${y1} A ${r} ${r} 0 ${largo} 1 ${x2} ${y2}" stroke="${z.color}" stroke-width="20" fill="none" stroke-linecap="butt" opacity="0.85"/>`;
  }).join('');

  return `
  <svg viewBox="0 0 300 175" style="width:100%; max-width:320px; overflow:visible;">
    ${arcos}
    <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="var(--text)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="8" fill="var(--text)"/>
  </svg>`;
}

function renderIndiceOperativo(){
  const m = calcularMetricas(STATE.filtered);
  const idx = calcularIndiceOperativo(m);
  const nivel = idx.total >= 70 ? "Desempeño sólido" : (idx.total >= 40 ? "Desempeño con oportunidades" : "Desempeño crítico");

  document.getElementById('gaugeCard').innerHTML = `
    <div class="gauge-wrap">
      ${dibujarGauge(idx.total)}
      <div class="gauge-score num">${idx.total}<span style="font-size:16px;color:var(--text-tertiary);">/100</span></div>
      <div class="gauge-caption">${nivel}</div>
      <div class="gauge-legend">
        <span><span class="dot red"></span> 0–40</span>
        <span><span class="dot yellow"></span> 40–70</span>
        <span><span class="dot green"></span> 70–100</span>
      </div>
    </div>`;

  const partes = [
    {n:"Cumplimiento", v:idx.partes.cumplimiento, peso:"30%"},
    {n:"Efectividad", v:idx.partes.efectividad, peso:"25%"},
    {n:"Tiempo de entrega", v:idx.partes.tiempo, peso:"20%"},
    {n:"Control de novedades", v:idx.partes.novedades, peso:"15%"},

  ];
  document.getElementById('idxBreakdown').innerHTML = partes.map(p=>`
    <div style="margin-bottom:16px;">
      <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;">
        <span style="font-weight:600;">${p.n} <span style="color:var(--text-tertiary); font-weight:500;">· peso ${p.peso}</span></span>
        <span class="num" style="font-weight:700;">${p.v}/100</span>
      </div>
      <div class="rank-bar-track"><div class="rank-bar-fill" style="width:${p.v}%;"></div></div>
    </div>`).join('');
}

/* ---------------------------------------------------------------
   11. HELPER — Crear / actualizar gráficos Chart.js
   --------------------------------------------------------------- */
function estiloEjes(){
  const cssText = getComputedStyle(document.documentElement);
  return {
    grid: cssText.getPropertyValue('--border').trim(),
    text: cssText.getPropertyValue('--text-secondary').trim(),
    accent: cssText.getPropertyValue('--accent').trim(),
    accentStrong: cssText.getPropertyValue('--accent-strong').trim(),
    success: cssText.getPropertyValue('--success').trim(),
    warning: cssText.getPropertyValue('--warning').trim(),
    danger: cssText.getPropertyValue('--danger').trim()
  };
}

function crearOActualizarChart(id, config){
  const ctx = document.getElementById(id);
  if(!ctx) return;
  if(typeof Chart === 'undefined'){
    const contenedor = ctx.closest('.chart-box');
    if(contenedor) contenedor.innerHTML = '<div class="empty-note">⚠ La librería de gráficos (Chart.js) no se pudo cargar desde el CDN.</div>';
    return;
  }
  if(STATE.charts[id]) STATE.charts[id].destroy();
  STATE.charts[id] = new Chart(ctx, config);
}

function opcionesBaseChart(colores, extra={}){
  return Object.assign({
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ labels:{ color: colores.text, font:{family:"Inter", size:11} } } },
    scales:{
      x:{ grid:{color:colores.grid, drawBorder:false}, ticks:{color:colores.text, font:{size:10}} },
      y:{ grid:{color:colores.grid, drawBorder:false}, ticks:{color:colores.text, font:{size:10}} }
    }
  }, extra);
}

/* ---------------------------------------------------------------
   12. RENDER — MÓDULO 3: COMPORTAMIENTO OPERATIVO
   --------------------------------------------------------------- */
function renderComportamiento(){
  const colores = estiloEjes();
  const filas = STATE.filtered;

  const porDia = new Map();
  filas.forEach(f=>{ if(f.fecha){ const k = toInputDate(f.fecha); porDia.set(k, (porDia.get(k)||0)+1); } });
  const diasOrdenados = [...porDia.keys()].sort();
  crearOActualizarChart('chartPorDia', {
    type:'bar',
    data:{ labels:diasOrdenados.map(d=>d.slice(5)), datasets:[{ label:'Servicios', data:diasOrdenados.map(d=>porDia.get(d)), backgroundColor:colores.accent, borderRadius:4 }] },
    options: opcionesBaseChart(colores, {plugins:{legend:{display:false}}})
  });

  const porMes = new Map();
  filas.forEach(f=>{ if(f.fecha){ const k = `${f.fecha.getFullYear()}-${String(f.fecha.getMonth()+1).padStart(2,'0')}`; porMes.set(k, (porMes.get(k)||0)+1); } });
  const mesesOrdenados = [...porMes.keys()].sort();
  crearOActualizarChart('chartPorMes', {
    type:'bar',
    data:{ labels:mesesOrdenados, datasets:[{ label:'Servicios', data:mesesOrdenados.map(m=>porMes.get(m)), backgroundColor:colores.accentStrong, borderRadius:4 }] },
    options: opcionesBaseChart(colores, {plugins:{legend:{display:false}}})
  });

  // Comparativo mensual: mes actual vs mes anterior equivalente en cumplimiento y volumen
  crearOActualizarChart('chartComparativo', {
    type:'bar',
    data:{ labels:mesesOrdenados, datasets:[
      { label:'Servicios', data:mesesOrdenados.map(m=>porMes.get(m)), backgroundColor:colores.accent, borderRadius:4, yAxisID:'y' },
      { label:'Cumplimiento %', data:mesesOrdenados.map(m=>{
          const subset = filas.filter(f=>f.fecha && `${f.fecha.getFullYear()}-${String(f.fecha.getMonth()+1).padStart(2,'0')}`===m);
          const met = calcularMetricas(subset); return met.cumplimiento ? Math.round(met.cumplimiento) : 0;
        }), type:'line', borderColor:colores.success, backgroundColor:colores.success, yAxisID:'y1', tension:.35 }
    ]},
    options: opcionesBaseChart(colores, { scales:{
      x:{grid:{color:colores.grid}, ticks:{color:colores.text}},
      y:{position:'left', grid:{color:colores.grid}, ticks:{color:colores.text}},
      y1:{position:'right', grid:{display:false}, ticks:{color:colores.text}, min:0, max:100}
    }})
  });

  // Tendencia: media móvil de 7 días sobre volumen diario
  const ventana = 7;
  const tendenciaValores = diasOrdenados.map((d,i)=>{
    const desde = Math.max(0, i-ventana+1);
    const slice = diasOrdenados.slice(desde, i+1).map(x=>porDia.get(x));
    return slice.reduce((a,b)=>a+b,0)/slice.length;
  });
  crearOActualizarChart('chartTendencia', {
    type:'line',
    data:{ labels:diasOrdenados.map(d=>d.slice(5)), datasets:[{ label:'Media móvil 7 días', data:tendenciaValores, borderColor:colores.accent, backgroundColor:'transparent', tension:.4, pointRadius:0, borderWidth:2.5 }] },
    options: opcionesBaseChart(colores, {plugins:{legend:{display:false}}})
  });
}

/* ---------------------------------------------------------------
   13. RENDER — MÓDULO 4: CUMPLIMIENTO (SEMÁFORO)
   --------------------------------------------------------------- */
function tablaSemaforoHTML(agregado, etiquetaCol){
  const ordenado = agregado.filter(a=>a.total>0).sort((a,b)=>b.total-a.total);
  if(!ordenado.length) return `<div class="empty-note">Sin datos para los filtros seleccionados.</div>`;
  return `<table class="data-table"><thead><tr><th>${etiquetaCol}</th><th>Servicios</th><th>Cumplimiento</th><th></th></tr></thead><tbody>
    ${ordenado.map(a=>{
      const nivel = iconoSemaforo(a.cumplimiento, CONFIG.UMBRAL_CUMPLIMIENTO, 85);
      return `<tr><td>${a.nombre}</td><td class="num">${formatoNumero(a.total)}</td><td class="num">${formatoPct(a.cumplimiento)}</td><td><span class="dot ${nivel}"></span></td></tr>`;
    }).join('')}
  </tbody></table>`;
}

function renderCumplimiento(){
  document.getElementById('tablaCumpCiudad').innerHTML = tablaSemaforoHTML(agregarPor(STATE.filtered,'ciudad'), 'Ciudad');
  document.getElementById('tablaCumpPunto').innerHTML = tablaSemaforoHTML(agregarPor(STATE.filtered,'punto'), 'Punto');
  document.getElementById('tablaCumpResponsable').innerHTML = tablaSemaforoHTML(agregarPor(STATE.filtered,'responsable'), 'Responsable');
}

/* ---------------------------------------------------------------
   14. RENDER — MÓDULO 5: PRODUCTIVIDAD POR FRANJA
   --------------------------------------------------------------- */
function renderFranja(){
  const agregado = agregarPor(STATE.filtered, 'franja').filter(a=>a.total>0);
  const totalGeneral = agregado.reduce((s,a)=>s+a.total,0);
  // Orden cronológico por hora (no por volumen de servicios)
  const horaAMinutos = (etiqueta)=>{
    const m = String(etiqueta).match(/(\d{1,2})\s*:\s*(\d{2})/);
    return m ? (parseInt(m[1],10)*60 + parseInt(m[2],10)) : Number.MAX_SAFE_INTEGER;
  };
  agregado.sort((a,b)=> horaAMinutos(a.nombre) - horaAMinutos(b.nombre));
  if(!agregado.length){ document.getElementById('tablaFranja').innerHTML = `<div class="empty-note">Sin datos.</div>`; return; }
  document.getElementById('tablaFranja').innerHTML = `
    <table class="data-table"><thead><tr>
      <th>Franja</th><th>Servicios</th><th>%</th><th>Tiempo prom.</th><th>Cumplimiento</th><th>Efectividad</th><th>Novedades</th>
    </tr></thead><tbody>
      ${agregado.map(a=>`
        <tr>
          <td>${a.nombre}</td>
          <td class="num">${formatoNumero(a.total)}</td>
          <td class="num">${formatoPct(totalGeneral? a.total/totalGeneral*100:0)}</td>
          <td class="num">${a.tiempoProm!==null? formatoNumero(a.tiempoProm,0)+' min':'N/D'}</td>
          <td class="num">${formatoPct(a.cumplimiento)}</td>
          <td class="num">${formatoPct(a.efectividad)}</td>
          <td class="num">${formatoNumero(a.novedadesCount)}</td>
        </tr>`).join('')}
    </tbody></table>`;
}

/* ---------------------------------------------------------------

   --------------------------------------------------------------- */
function listaRankingHTML(items, maxItems=8, formato='numero'){
  const top = items.slice(0, maxItems);
  const max = Math.max(...top.map(i=>i.valor), 1);
  if(!top.length) return `<div class="empty-note">Sin datos.</div>`;
  return top.map((i,idx)=>`
    <div class="rank-row">
      <div class="rank-pos">${String(idx+1).padStart(2,'0')}</div>
      <div>
        <div class="rank-name" title="${i.nombre}">${i.nombre}</div>
        <div class="rank-bar-track"><div class="rank-bar-fill" style="width:${(i.valor/max*100)}%;"></div></div>
      </div>
      <div class="rank-value">${formato==='moneda'?formatoMoneda(i.valor):(formato==='pct'?formatoPct(i.valor):formatoNumero(i.valor))}</div>
    </div>`).join('');
}

/* ---------------------------------------------------------------
   16C. RENDER — MÓDULO 8: PEDIDOS SIN CUMPLIMIENTO DE ENTREGA
   (columnas reales "Novedad Cumplimiento" y "Responsable" -causa raíz-)

function renderPedidosSinCumplimiento(){
  const filas = STATE.filtered.filter(f=>f.cumple === false);
  // "SIN SEGUIMIENTO DIARIO" es un marcador de "no se hizo seguimiento", no una causa
  // raíz real ni un responsable identificable: se excluye del desglose por pedido del usuario.
  const esCausaValida = (valor)=>{
    if(!esNovedadValida(valor)) return false;
    return normalizarTexto(valor) !== "sin seguimiento diario";
  };
  const conMotivo = filas.filter(f=>esCausaValida(f.motivoIncumplimiento));
  const dias = new Set(filas.map(f=>f.fecha ? toInputDate(f.fecha) : null).filter(Boolean));
  const promedioDia = dias.size ? filas.length/dias.size : null;

  const tarjetas = [
    { label:"Pedidos sin cumplimiento", valor:formatoNumero(filas.length), icon:"🔴", color:"danger" },
    { label:"Promedio por día", valor: promedioDia!==null? formatoNumero(promedioDia,1) : "N/D", icon:"📅", color:"warning" },
    { label:"% sobre el total filtrado", valor: STATE.filtered.length? formatoPct(filas.length/STATE.filtered.length*100) : "N/D", icon:"📉", color:"warning" }
  ];
  document.getElementById('kpiSinCumplimiento').innerHTML = tarjetas.map(t=>`
    <div class="card kpi-card hoverable">
      <div class="kpi-top"><span class="kpi-label">${t.label}</span><div class="kpi-icon" style="background:var(--${t.color}-bg); color:var(--${t.color});">${t.icon}</div></div>
      <div class="kpi-value">${t.valor}</div>
    </div>`).join('');

  const colores = estiloEjes();
  const porMotivo = new Map();
  conMotivo.forEach(f=>{ const k = f.motivoIncumplimiento; porMotivo.set(k, (porMotivo.get(k)||0)+1); });
  const motivosOrdenados = [...porMotivo.entries()].sort((a,b)=>b[1]-a[1]);
  crearOActualizarChart('chartMotivoIncumplimiento', {
    type:'bar',
    data:{ labels:motivosOrdenados.map(m=>m[0]), datasets:[{ label:'Pedidos', data:motivosOrdenados.map(m=>m[1]), backgroundColor:colores.danger, borderRadius:4 }] },
    options: opcionesBaseChart(colores, {indexAxis:'y', plugins:{legend:{display:false}}})
  });

  const conResp = filas.filter(f=>esCausaValida(f.responsableIncumplimiento));
  const mapaResp = new Map();
  conResp.forEach(f=>{ const k = f.responsableIncumplimiento; mapaResp.set(k, (mapaResp.get(k)||0)+1); });
  const rankingResp = [...mapaResp.entries()].map(([nombre,valor])=>({nombre, valor})).sort((a,b)=>b.valor-a.valor);
  document.getElementById('rankResponsableIncumplimiento').innerHTML = listaRankingHTML(rankingResp, 10);
}
function renderTicketPromedio(){
  const f = leerFiltrosActuales();
  let subset = STATE.promo;
  if(f.ciudad) subset = subset.filter(p=>normalizarTexto(p.ciudad) === normalizarTexto(f.ciudad));
  if(f.punto) subset = subset.filter(p=>normalizarTexto(p.punto) === normalizarTexto(f.punto));

  const nacional = calcularTicketPromedio(STATE.promo, {});
  document.getElementById('ticketNacional').textContent = formatoMoneda(nacional);

  const porMes = new Map();
  subset.forEach(p=>{
    if(p.anio && p.mes && p.ticket !== null){
      const key = `${p.anio}-${String(p.mes).padStart(2,'0')}`;
      if(!porMes.has(key)) porMes.set(key, []);
      porMes.get(key).push(p.ticket);
    }
  });
  const mesesOrdenados = [...porMes.keys()].sort();
  const colores = estiloEjes();
  crearOActualizarChart('chartTicketMensual', {
    type:'line',
    data:{ labels:mesesOrdenados, datasets:[{ label:'Ticket promedio', data:mesesOrdenados.map(m=>{
      const arr = porMes.get(m); return arr.reduce((a,b)=>a+b,0)/arr.length;
    }), borderColor:colores.accent, backgroundColor:'transparent', tension:.35, borderWidth:2.5 }] },
    options: opcionesBaseChart(colores, {plugins:{legend:{display:false}}})
  });

  const porPunto = new Map();
  subset.forEach(p=>{
    if(p.ticket !== null){
      if(!porPunto.has(p.punto)) porPunto.set(p.punto, []);
      porPunto.get(p.punto).push(p.ticket);
    }
  });
  const rankingPuntos = [...porPunto.entries()].map(([nombre, arr])=>({nombre, valor: arr.reduce((a,b)=>a+b,0)/arr.length}))
    .sort((a,b)=>b.valor-a.valor);
  document.getElementById('rankTicketPunto').innerHTML = listaRankingHTML(rankingPuntos, 10, 'moneda');

  const filasTabla = [...porPunto.entries()].map(([punto, arr])=>{
    const primero = subset.find(p=>p.punto===punto);
    return { punto, ciudad: primero? primero.ciudad : '', promedio: arr.reduce((a,b)=>a+b,0)/arr.length, registros: arr.length };
  }).sort((a,b)=>b.promedio-a.promedio);

  document.getElementById('tablaTicket').innerHTML = filasTabla.length ? `
    <table class="data-table"><thead><tr><th>Punto</th><th>Ciudad</th><th>Ticket promedio</th><th>Registros</th></tr></thead><tbody>
      ${filasTabla.map(r=>`<tr><td>${r.punto}</td><td>${r.ciudad}</td><td class="num">${formatoMoneda(r.promedio)}</td><td class="num">${formatoNumero(r.registros)}</td></tr>`).join('')}
    </tbody></table>` : `<div class="empty-note">Sin datos de la hoja Promoción de Entradas.</div>`;

  // Per Cápita: costo fijo del punto / total de servicios del año (columna Total general)
  let resumen = STATE.promoResumen || [];
  if(f.ciudad) resumen = resumen.filter(r=>normalizarTexto(r.ciudad) === normalizarTexto(f.ciudad));
  if(f.punto) resumen = resumen.filter(r=>normalizarTexto(r.punto) === normalizarTexto(f.punto));
  const conPerCapita = resumen.filter(r=>r.costoPorServicio !== null).sort((a,b)=>a.costoPorServicio-b.costoPorServicio);
  document.getElementById('tablaPerCapita').innerHTML = conPerCapita.length ? `
    <table class="data-table"><thead><tr><th>Punto</th><th>Ciudad</th><th>Clasificación</th><th>Mensajeros</th><th>Costo</th><th>Servicios (año)</th><th>Per Cápita</th></tr></thead><tbody>
      ${conPerCapita.map(r=>`
        <tr>
          <td>${r.punto}</td><td>${r.ciudad}</td><td>${r.clasificacion||'N/D'}</td>
          <td class="num">${r.mensajeros!==null?formatoNumero(r.mensajeros,1):'N/D'}</td>
          <td class="num">${formatoMoneda(r.costo)}</td>
          <td class="num">${formatoNumero(r.totalGeneral)}</td>
          <td class="num">${formatoMoneda(r.costoPorServicio)}</td>
        </tr>`).join('')}
    </tbody></table>` : `<div class="empty-note">Sin datos de Mensajeros/Costo en la hoja Promoción de Entradas.</div>`;
}
