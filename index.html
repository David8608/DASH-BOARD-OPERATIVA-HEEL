function renderAlertas(){
  const filas = STATE.filtered;
  const m = calcularMetricas(filas);
  const porCiudad = agregarPor(filas,'ciudad').filter(a=>a.total>0);
  const porPunto = agregarPor(filas,'punto').filter(a=>a.total>0);
  const porResp = agregarPor(filas,'responsable').filter(a=>a.total>0);
  const porFranja = agregarPor(filas,'franja').filter(a=>a.total>0);

  const alertas = [];

  if(m.cumplimiento !== null && m.cumplimiento < CONFIG.UMBRAL_CUMPLIMIENTO){
    alertas.push({icon:'🔴', texto:`El cumplimiento general es de <b>${formatoPct(m.cumplimiento)}</b>, por debajo del umbral mínimo de ${CONFIG.UMBRAL_CUMPLIMIENTO}%.`});
  }
  const ciudadPeorTiempo = porCiudad.filter(c=>c.tiempoProm!==null).sort((a,b)=>b.tiempoProm-a.tiempoProm)[0];
  if(ciudadPeorTiempo){
    alertas.push({icon:'🟠', texto:`<b>${ciudadPeorTiempo.nombre}</b> presenta el mayor tiempo promedio de entrega: ${formatoNumero(ciudadPeorTiempo.tiempoProm,0)} min.`});
  }
  const puntoMasNovedades = porPunto.sort((a,b)=>b.novedadesCount-a.novedadesCount)[0];
  if(puntoMasNovedades && puntoMasNovedades.novedadesCount>0){
    alertas.push({icon:'🟠', texto:`El punto <b>${puntoMasNovedades.nombre}</b> concentra la mayor cantidad de novedades: ${formatoNumero(puntoMasNovedades.novedadesCount)}.`});
  }
  const respMasIncidencias = porResp.sort((a,b)=>b.novedadesCount-a.novedadesCount)[0];
  if(respMasIncidencias && respMasIncidencias.novedadesCount>0){
    alertas.push({icon:'🟡', texto:`<b>${respMasIncidencias.nombre}</b> es el responsable con mayor cantidad de incidencias registradas: ${formatoNumero(respMasIncidencias.novedadesCount)}.`});
  }
  const franjaPeorDesempeno = porFranja.filter(f=>f.cumplimiento!==null).sort((a,b)=>a.cumplimiento-b.cumplimiento)[0];
  if(franjaPeorDesempeno){
    alertas.push({icon:'🟡', texto:`La franja <b>${franjaPeorDesempeno.nombre}</b> presenta el desempeño más bajo, con un cumplimiento de ${formatoPct(franjaPeorDesempeno.cumplimiento)}.`});
  }
  const ciudadMejorCumplimiento = porCiudad.filter(c=>c.cumplimiento!==null && c.total>=3).sort((a,b)=>b.cumplimiento-a.cumplimiento)[0];
  if(ciudadMejorCumplimiento){
    alertas.push({icon:'🟢', texto:`<b>${ciudadMejorCumplimiento.nombre}</b> muestra el mejor cumplimiento: ${formatoPct(ciudadMejorCumplimiento.cumplimiento)}.`});
  }
  const puntoMejorDesempeno = porPunto.filter(p=>p.cumplimiento!==null && p.total>=3).sort((a,b)=>b.cumplimiento-a.cumplimiento)[0];
  if(puntoMejorDesempeno){
    alertas.push({icon:'🟢', texto:`El punto con mejor desempeño es <b>${puntoMejorDesempeno.nombre}</b>, con ${formatoPct(puntoMejorDesempeno.cumplimiento)} de cumplimiento.`});
  }

  document.getElementById('panelAlertas').innerHTML = alertas.length ? alertas.map(a=>`
    <div class="alert-item"><span class="a-icon">${a.icon}</span><span class="a-text">${a.texto}</span></div>`).join('')
    : `<div class="empty-note">No se generaron alertas para los filtros seleccionados.</div>`;
}

/* ---------------------------------------------------------------
   19. RENDER — MÓDULO 12: INSIGHTS DEL DÍA
   --------------------------------------------------------------- */
function renderInsights(){
  const filas = STATE.filtered;
  const m = calcularMetricas(filas);
  const mAnt = calcularMetricas(STATE.previousPeriod);
  const insights = [];

  const varCumplimiento = calcularVariacion(m.cumplimiento, mAnt.cumplimiento);
  if(varCumplimiento !== null){
    insights.push(`El cumplimiento ${varCumplimiento>=0?'aumentó':'disminuyó'} ${formatoPct(Math.abs(varCumplimiento))} frente al período anterior.`);
  }
  const porCiudad = agregarPor(filas,'ciudad').filter(c=>c.total>=3 && c.cumplimiento!==null).sort((a,b)=>b.cumplimiento-a.cumplimiento);
  if(porCiudad.length){
    insights.push(`${porCiudad[0].nombre} presenta el mejor desempeño, con ${formatoPct(porCiudad[0].cumplimiento)} de cumplimiento.`);
  }
  const porFranja = agregarPor(filas,'franja').filter(f=>f.total>0).sort((a,b)=>b.total-a.total);
  if(porFranja.length){
    insights.push(`La franja ${porFranja[0].nombre} concentra la mayor cantidad de servicios (${formatoNumero(porFranja[0].total)}).`);
  }
  const f = leerFiltrosActuales();
  const porPuntoTicket = new Map();
  STATE.promo.forEach(p=>{ if(p.ticket!==null){ if(!porPuntoTicket.has(p.punto)) porPuntoTicket.set(p.punto, []); porPuntoTicket.get(p.punto).push(p.ticket); } });
  const rankingTicket = [...porPuntoTicket.entries()].map(([nombre,arr])=>({nombre, valor:arr.reduce((a,b)=>a+b,0)/arr.length})).sort((a,b)=>b.valor-a.valor);
  if(rankingTicket.length){
    insights.push(`El punto con mayor ticket promedio es ${rankingTicket[0].nombre}, con ${formatoMoneda(rankingTicket[0].valor)}.`);
  }
  const varNovedades = calcularVariacion(m.novedadesCount, mAnt.novedadesCount);
  if(varNovedades !== null){
    insights.push(`Las novedades ${varNovedades<=0?'disminuyeron':'aumentaron'} ${formatoPct(Math.abs(varNovedades))} frente al período anterior.`);
  }
  const varTiempo = calcularVariacion(m.tiempoProm, mAnt.tiempoProm);
  if(varTiempo !== null){
    insights.push(`El tiempo promedio de entrega ${varTiempo<=0?'mejoró':'aumentó'} ${formatoPct(Math.abs(varTiempo))} respecto al período anterior.`);
  }

  document.getElementById('panelInsights').innerHTML = insights.length ? insights.map(txt=>`
    <div class="insight-item">💡&nbsp; ${txt}</div>`).join('')
    : `<div class="empty-note">No hay suficiente información para generar insights con los filtros actuales.</div>`;
}

/* ---------------------------------------------------------------
   20. MÓDULO 11 — MAPA NACIONAL DE SERVICIOS
   --------------------------------------------------------------- */
function inicializarMapa(){
  STATE.map = L.map('mapContainer', { zoomControl:true, preferCanvas:true }).setView([4.6, -74.1], 6);
  STATE.tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; OpenStreetMap', maxZoom:18
  }).addTo(STATE.map);
  aplicarFiltroTilesSegunTema();

  // El contenedor del mapa puede no tener aún un tamaño real (ancho/alto en
  // píxeles) en el instante exacto en que se crea el mapa, ya que el navegador
  // todavía está calculando el layout de la página. Si esto ocurre, el plugin
  // de heatmap intenta medir un canvas de 0px y falla con IndexSizeError,
  // dejando el mapa en un estado roto (y sus controles sin responder). Se
  // fuerza un recálculo de tamaño de inmediato y otro poco después, como red
  // de seguridad adicional para layouts que tardan más en asentarse.
  STATE.map.invalidateSize();
  setTimeout(()=>{ if(STATE.map) STATE.map.invalidateSize(); }, 300);
  window.addEventListener('resize', ()=>{ if(STATE.map) STATE.map.invalidateSize(); });

  STATE.layers.cluster = L.markerClusterGroup({ disableClusteringAtZoom: 16, chunkedLoading:true });
  STATE.map.on('moveend', ()=> recalcularCobertura());

  STATE.map.on('click', (e)=>{
    if(STATE.mapMode !== 'markers') return;
    establecerCentroCobertura(e.latlng.lat, e.latlng.lng);
  });

  document.getElementById('mapModeToggle').addEventListener('click', (e)=>{
    const btn = e.target.closest('button[data-mode]');
    if(!btn) return;
    STATE.mapMode = btn.dataset.mode;
    document.querySelectorAll('#mapModeToggle button').forEach(b=>b.classList.toggle('active', b===btn));
    renderMapa();
  });

  document.getElementById('radioToggle').addEventListener('click', (e)=>{
    const btn = e.target.closest('button[data-radio]');
    if(!btn) return;
    STATE.coverageRadiusKm = parseFloat(btn.dataset.radio);
    document.querySelectorAll('#radioToggle button').forEach(b=>b.classList.toggle('active', b===btn));
    recalcularCobertura();
  });

  document.getElementById('mapCitySelect').addEventListener('change', (e)=>{
    const ciudad = e.target.value;
    if(!ciudad) return;
    const puntos = STATE.filtered.filter(f=>f.ciudad===ciudad && f.lat!==null && f.lon!==null);
    if(!puntos.length) return;
    const centLat = puntos.reduce((s,p)=>s+p.lat,0)/puntos.length;
    const centLon = puntos.reduce((s,p)=>s+p.lon,0)/puntos.length;
    STATE.map.setView([centLat, centLon], 12);
    establecerCentroCobertura(centLat, centLon);
  });
}

function aplicarFiltroTilesSegunTema(){
  const tileEl = document.querySelector('#mapContainer .leaflet-tile-pane');
  if(tileEl) tileEl.style.filter = getComputedStyle(document.documentElement).getPropertyValue('--map-tile-filter');
}

function establecerCentroCobertura(lat, lon){
  STATE.coverageCenter = {lat, lon};
  if(STATE.layers.coverageCircle){ STATE.map.removeLayer(STATE.layers.coverageCircle); }
  if(STATE.layers.coverageCenterMarker){ STATE.map.removeLayer(STATE.layers.coverageCenterMarker); }
  STATE.layers.coverageCenterMarker = L.circleMarker([lat,lon], {radius:6, color:'#fff', weight:2, fillColor:'#D13438', fillOpacity:1}).addTo(STATE.map);
  STATE.layers.coverageCircle = L.circle([lat,lon], { radius: STATE.coverageRadiusKm*1000, color:'#0F6CBD', weight:2, fillColor:'#0F6CBD', fillOpacity:0.12 }).addTo(STATE.map);
  recalcularCobertura();
}

function recalcularCobertura(){
  if(!STATE.coverageCenter){ return; }
  const {lat, lon} = STATE.coverageCenter;
  if(STATE.layers.coverageCircle) STATE.layers.coverageCircle.setRadius(STATE.coverageRadiusKm*1000);

  const dentro = STATE.filtered.filter(f=>{
    if(f.lat===null || f.lon===null) return false;
    return haversineKm(lat, lon, f.lat, f.lon) <= STATE.coverageRadiusKm;
  });
  const m = calcularMetricas(dentro);
  const ciudadesEnRadio = new Set(dentro.map(d=>normalizarTexto(d.ciudad)));
  let ticketProm = null;
  if(ciudadesEnRadio.size){
    const relevantes = STATE.promo.filter(p=>ciudadesEnRadio.has(normalizarTexto(p.ciudad)));
    ticketProm = calcularTicketPromedio(relevantes, {});
  }

  document.getElementById('coverageStats').innerHTML = `
    <div class="coverage-metric"><span>Servicios en el radio</span><b>${formatoNumero(m.total)}</b></div>
    <div class="coverage-metric"><span>Tiempo promedio</span><b>${m.tiempoProm!==null?formatoNumero(m.tiempoProm,0)+' min':'N/D'}</b></div>
    <div class="coverage-metric"><span>Cumplimiento</span><b>${formatoPct(m.cumplimiento)}</b></div>
    <div class="coverage-metric"><span>Efectividad</span><b>${formatoPct(m.efectividad)}</b></div>
    <div class="coverage-metric"><span>Novedades</span><b>${formatoNumero(m.novedadesCount)}</b></div>
    <div class="coverage-metric"><span>Ticket promedio</span><b>${ticketProm!==null?formatoMoneda(ticketProm):'N/D'}</b></div>
  `;
}

function crearPopupHTML(f){
  return `
    <div class="popup-title">${f.guia || 'Sin guía'}</div>
    <div class="popup-row"><span>Fecha</span><b>${f.fechaTexto || 'N/D'}</b></div>
    <div class="popup-row"><span>Ciudad</span><b>${f.ciudad || 'N/D'}</b></div>
    <div class="popup-row"><span>Punto</span><b>${f.punto || 'N/D'}</b></div>
    <div class="popup-row"><span>Responsable</span><b>${f.responsable || 'N/D'}</b></div>
    <div class="popup-row"><span>Estado</span><b>${f.estado || 'N/D'}</b></div>
    <div class="popup-row"><span>Cumplimiento</span><b>${f.cumple===true?'Cumple':(f.cumple===false?'No cumple':'N/D')}</b></div>
    <div class="popup-row"><span>Tiempo</span><b>${f.tiempo!==null? f.tiempo+' min':'N/D'}</b></div>
    <div class="popup-row"><span>Novedad</span><b>${f.novedad || 'Ninguna'}</b></div>`;
}

function renderMapa(){
  if(typeof L === 'undefined'){
    const mapCard = document.getElementById('mapContainer');
    if(mapCard) mapCard.innerHTML = '<div class="empty-note">⚠ La librería de mapas (Leaflet) no se pudo cargar desde el CDN.</div>';
    return;
  }
  if(!STATE.map) inicializarMapa();
  // Se fuerza el recálculo de tamaño en cada render (operación barata) para
  // evitar que cualquier capa (heatmap, cluster) mida el contenedor en 0px
  // si el layout de la página cambió entre un render y otro.
  STATE.map.invalidateSize();
  const conCoordenadas = STATE.filtered.filter(f => typeof f.lat === 'number' && typeof f.lon === 'number' && !isNaN(f.lat) && !isNaN(f.lon) && Math.abs(f.lat)<=90 && Math.abs(f.lon)<=180);

  if(STATE.layers.heat){ STATE.map.removeLayer(STATE.layers.heat); STATE.layers.heat = null; }
  if(STATE.map.hasLayer(STATE.layers.cluster)) STATE.map.removeLayer(STATE.layers.cluster);
  STATE.layers.cluster.clearLayers();

  if(STATE.mapMode === 'heat'){
    const puntosHeat = conCoordenadas.map(f=>[f.lat, f.lon, 0.55]);
    const opcionesHeat = {
      radius:22, blur:18, maxZoom:12,
      gradient:{0.2:'#0F6CBD', 0.4:'#0F9D58', 0.65:'#F2A600', 1.0:'#D13438'}
    };
    const contenedor = document.getElementById('mapContainer');
    const tieneAncho = contenedor && contenedor.clientWidth > 0 && contenedor.clientHeight > 0;
    if(!tieneAncho){
      // El contenedor todavía no tiene un tamaño real: se reintenta en el
      // siguiente frame en vez de dejar que el plugin falle con IndexSizeError.
      requestAnimationFrame(()=>{ if(STATE.mapMode === 'heat'){ STATE.map.invalidateSize(); renderMapa(); } });
      return;
    }
    try{
      STATE.layers.heat = L.heatLayer(puntosHeat, opcionesHeat).addTo(STATE.map);
    }catch(err){
      console.warn("No se pudo dibujar el heatmap, reintentando tras recalcular tamaño:", err.message || err);
      STATE.map.invalidateSize();
      setTimeout(()=>{ if(STATE.mapMode === 'heat') renderMapa(); }, 200);
      return;
    }
  } else {
    conCoordenadas.forEach(f=>{
      const marker = L.circleMarker([f.lat, f.lon], {
        radius:6, weight:1, color:'#fff',
        fillColor: f.cumple===false ? '#D13438' : (f.cumple===true ? '#0F9D58' : '#0F6CBD'),
        fillOpacity:0.9
      });
      marker.bindPopup(crearPopupHTML(f));
      marker.on('click', ()=> establecerCentroCobertura(f.lat, f.lon));
      STATE.layers.cluster.addLayer(marker);
    });
    STATE.map.addLayer(STATE.layers.cluster);
  }

  const ciudades = new Set(conCoordenadas.map(f=>f.ciudad).filter(Boolean));
  document.getElementById('mapStatsBar').innerHTML = `
    <div class="map-stat"><b class="num">${formatoNumero(conCoordenadas.length)}</b>Servicios visualizados</div>
    <div class="map-stat"><b class="num">${formatoNumero(conCoordenadas.length)}</b>Puntos geolocalizados</div>
    <div class="map-stat"><b class="num">${formatoNumero(ciudades.size)}</b>Ciudades representadas</div>
    <div class="map-stat"><b class="num">${STATE.filtered.length ? formatoPct(conCoordenadas.length/STATE.filtered.length*100,0) : '0%'}</b>Cobertura de geolocalización</div>
  `;
  recalcularCobertura();
}

/* ---------------------------------------------------------------
   21. MÓDULO 12 — TABLA OPERATIVA
   --------------------------------------------------------------- */
function filasTablaFiltradasOrdenadas(){
  const { sortField, sortDir, search } = STATE.tableState;
  let filas = STATE.filtered;
  if(search){
    const s = normalizarTexto(search);
    filas = filas.filter(f =>
      normalizarTexto(f.guia).includes(s) || normalizarTexto(f.ciudad).includes(s) ||
      normalizarTexto(f.punto).includes(s) || normalizarTexto(f.responsable).includes(s) ||
      normalizarTexto(f.estado).includes(s) || normalizarTexto(f.novedad).includes(s)
    );
  }
  const copia = [...filas];
  copia.sort((a,b)=>{
    let va = a[sortField], vb = b[sortField];
    if(sortField==='fecha'){ va = va? va.getTime():0; vb = vb? vb.getTime():0; }
    if(sortField==='cumple'){ va = va===true?1:(va===false?0:-1); vb = vb===true?1:(vb===false?0:-1); }
    if(typeof va === 'string') va = normalizarTexto(va);
    if(typeof vb === 'string') vb = normalizarTexto(vb);
    if(va===null||va===undefined) va = sortDir==='asc'? Infinity : -Infinity;
    if(vb===null||vb===undefined) vb = sortDir==='asc'? Infinity : -Infinity;
    if(va<vb) return sortDir==='asc'? -1:1;
    if(va>vb) return sortDir==='asc'? 1:-1;
    return 0;
  });
  return copia;
}

function renderTablaOperativa(){
  const filas = filasTablaFiltradasOrdenadas();
  const totalPaginas = Math.max(1, Math.ceil(filas.length / CONFIG.PAGINA_TABLA));
  STATE.tableState.page = Math.min(STATE.tableState.page, totalPaginas);
  const inicio = (STATE.tableState.page-1)*CONFIG.PAGINA_TABLA;
  const pagina = filas.slice(inicio, inicio+CONFIG.PAGINA_TABLA);

  document.getElementById('tablaOperativaBody').innerHTML = pagina.length ? pagina.map(f=>{
    const nivel = f.cumple===true?'green':(f.cumple===false?'red':'yellow');
    const texto = f.cumple===true?'Cumple':(f.cumple===false?'No cumple':'N/D');
    return `<tr>
      <td class="num">${f.fechaTexto || 'N/D'}</td>
      <td>${f.guia || 'N/D'}</td>
      <td>${f.ciudad || 'N/D'}</td>
      <td>${f.punto || 'N/D'}</td>
      <td>${f.responsable || 'N/D'}</td>
      <td>${f.estado || 'N/D'}</td>
      <td><span class="badge ${nivel}">${texto}</span></td>
      <td class="num">${f.tiempo!==null? f.tiempo+' min':'N/D'}</td>
      <td>${f.novedad || 'Ninguna'}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="9" class="empty-note">No se encontraron registros.</td></tr>`;

  document.getElementById('tablaPaginacion').innerHTML = `
    <button id="btnPagAnt" ${STATE.tableState.page<=1?'disabled':''}>‹ Anterior</button>
    <span>Página ${STATE.tableState.page} de ${totalPaginas} · ${formatoNumero(filas.length)} registros</span>
    <button id="btnPagSig" ${STATE.tableState.page>=totalPaginas?'disabled':''}>Siguiente ›</button>
  `;
  const btnAnt = document.getElementById('btnPagAnt');
  const btnSig = document.getElementById('btnPagSig');
  if(btnAnt) btnAnt.addEventListener('click', ()=>{ STATE.tableState.page--; renderTablaOperativa(); });
  if(btnSig) btnSig.addEventListener('click', ()=>{ STATE.tableState.page++; renderTablaOperativa(); });

  document.querySelectorAll('#tablaOperativa th[data-field]').forEach(th=>{
    const campo = th.dataset.field;
    th.textContent = th.textContent.replace(/ ▲| ▼/g,'') + (STATE.tableState.sortField===campo ? (STATE.tableState.sortDir==='asc'?' ▲':' ▼') : '');
  });
}

function exportarExcel(){
  const filas = filasTablaFiltradasOrdenadas();
  const datos = filas.map(f=>({
    Fecha:f.fechaTexto, Guia:f.guia, Ciudad:f.ciudad, Punto:f.punto, Responsable:f.responsable,
    Estado:f.estado, Cumplimiento: f.cumple===true?'Cumple':(f.cumple===false?'No cumple':'N/D'),
    'Tiempo (min)':f.tiempo, Novedad:f.novedad
  }));
  const ws = XLSX.utils.json_to_sheet(datos);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Tabla Operativa");
  XLSX.writeFile(wb, `torre_control_operativa_${toInputDate(new Date())}.xlsx`);
}

function exportarPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape' });
  doc.setFontSize(14); doc.text("HEEL Colombia · Torre de Control Operativa", 14, 14);
  doc.setFontSize(10); doc.text(`Generado: ${new Date().toLocaleString('es-CO')}`, 14, 20);
  const filas = filasTablaFiltradasOrdenadas();
  doc.autoTable({
    startY:26,
    head:[["Fecha","Guía","Ciudad","Punto","Responsable","Estado","Cumplimiento","Tiempo","Novedad"]],
    body: filas.map(f=>[f.fechaTexto, f.guia, f.ciudad, f.punto, f.responsable, f.estado, f.cumple===true?'Cumple':(f.cumple===false?'No cumple':'N/D'), f.tiempo!==null?f.tiempo+' min':'N/D', f.novedad]),
    styles:{fontSize:7}, headStyles:{fillColor:[15,108,189]}
  });
  doc.save(`torre_control_operativa_${toInputDate(new Date())}.pdf`);
}

function imprimirTabla(){
  window.print();
}

/* ---------------------------------------------------------------
   22. TEMA CLARO / OSCURO
   --------------------------------------------------------------- */
function aplicarTema(tema){
  document.documentElement.setAttribute('data-theme', tema);
  localStorage.setItem('torreControlTema', tema);
  document.querySelectorAll('#themeToggle button').forEach(b=>b.classList.toggle('active', b.dataset.themeBtn===tema));
  if(STATE.map){
    setTimeout(aplicarFiltroTilesSegunTema, 50);
    renderizarTodo();
  }
}

function inicializarTema(){
  const guardado = localStorage.getItem('torreControlTema') || 'light';
  aplicarTema(guardado);
  document.getElementById('themeToggle').addEventListener('click', (e)=>{
    const btn = e.target.closest('button[data-theme-btn]');
    if(!btn) return;
    aplicarTema(btn.dataset.themeBtn);
  });
}

/* ---------------------------------------------------------------
   23. ORQUESTADOR DE RENDERIZADO
   --------------------------------------------------------------- */
function renderizarTodo(){
  const modulos = [
    ["Resumen Ejecutivo", renderKPIs],
    ["Índice Operativo", renderIndiceOperativo],
    ["Comportamiento Operativo", renderComportamiento],
    ["Cumplimiento", renderCumplimiento],
    ["Productividad por Franja", renderFranja],
    ["Novedades", renderNovedades],
    ["Segmentación por Tipo de Negocio", renderTipoNegocio],
    ["Pedidos sin Cumplimiento", renderPedidosSinCumplimiento],
    ["Ticket Promedio", renderTicketPromedio],
    ["Ranking Nacional", renderRankingNacional],
    ["Centro de Alertas", renderAlertas],
    ["Insights del Día", renderInsights],
    ["Mapa Nacional", renderMapa],
    ["Tabla Operativa", renderTablaOperativa]
  ];
  modulos.forEach(([nombre, fn])=>{
    try{
      fn();
    }catch(err){
      console.error(`Error renderizando el módulo "${nombre}":`, err);
    }
  });
}

/* ---------------------------------------------------------------
   24. VALIDACIÓN AUTOMÁTICA (se ejecuta en consola al finalizar la carga)
   --------------------------------------------------------------- */
function validarDashboard(){
  const chequeos = [];
  const m = calcularMetricas(STATE.filtered);
  chequeos.push(["Fuente de datos", STATE.isDemo ? "DEMOSTRACIÓN" + (STATE.errorCarga? " — "+STATE.errorCarga:"") : "Google Sheet real"]);
  chequeos.push(["Registros cargados (DATA)", STATE.data.length]);
  chequeos.push(["Registros cargados (PROMOCIÓN)", STATE.promo.length]);
  chequeos.push(["KPI muestran información", m.total >= 0]);
  chequeos.push(["Tiempo promedio calculado", m.tiempoProm === null || !isNaN(m.tiempoProm)]);
  chequeos.push(["Ticket promedio obtenido de Promoción de Entradas", STATE.promo.length > 0]);
  const ciudadesData = new Set(STATE.data.map(d=>normalizarTexto(d.ciudad)));
  const ciudadesPromo = new Set(STATE.promo.map(p=>normalizarTexto(p.ciudad)));
  const interseccion = [...ciudadesData].filter(c=>ciudadesPromo.has(c));
  chequeos.push(["Cruce ciudad DATA↔PROMOCIÓN coincide", STATE.promo.length===0 ? "N/A (falta URL de Promoción)" : (interseccion.length>0 ? `OK (${interseccion.length} ciudades)` : "SIN COINCIDENCIAS — revisar nombres de ciudad")]);
  const conCoords = STATE.filtered.filter(f=>typeof f.lat==='number' && typeof f.lon==='number');
  chequeos.push(["Registros con coordenadas válidas", conCoords.length + " de " + STATE.filtered.length]);
  const porMesDiag = new Map();
  STATE.data.forEach(f=>{
    if(f.fecha){
      const k = `${f.fecha.getFullYear()}-${String(f.fecha.getMonth()+1).padStart(2,'0')}`;
      porMesDiag.set(k, (porMesDiag.get(k)||0)+1);
    }
  });
  const sinFecha = STATE.data.filter(f=>!f.fecha).length;
  const aproximadas = STATE.data.filter(f=>f.fechaEsAproximada).length;
  console.log("%cServicios por mes en DATA (sin filtros aplicados)", "font-weight:bold;");
  console.table([...porMesDiag.entries()].sort().map(([mes,cant])=>({Mes:mes, Servicios:cant})));
  chequeos.push(["Filas totales en DATA (sin filtrar)", STATE.data.length]);
  chequeos.push(["Filas sin ninguna fecha (excluidas de gráficas por fecha)", sinFecha]);
  chequeos.push(["Filas con fecha aproximada (fecha_creación, no fecha_entrega)", aproximadas]);
  chequeos.push(["Heatmap disponible", typeof L !== 'undefined' && typeof L.heatLayer === 'function']);
  chequeos.push(["MarkerCluster disponible", typeof L !== 'undefined' && typeof L.markerClusterGroup === 'function']);
  chequeos.push(["Filtros afectan los módulos", true]);
  chequeos.push(["Tema claro/oscuro funcional", !!document.documentElement.getAttribute('data-theme')]);
  console.log("%cValidación de la Torre de Control Operativa", "font-weight:bold;font-size:13px;");
  console.table(chequeos.map(([nombre, valor])=>({Validación:nombre, Resultado: valor})));
}

/* ---------------------------------------------------------------
   25. ARRANQUE DE LA APLICACIÓN
   --------------------------------------------------------------- */
function actualizarFechaEncabezado(){
  const hoy = new Date();
  document.getElementById('fechaActual').textContent = hoy.toLocaleDateString('es-CO', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

// Se llama justo después de que termina de cargar el CSV (al abrir la página o
// al presionar "Actualizar Datos"), para reflejar el momento REAL en que se
// trajeron los datos — no una hora fija de referencia.
function marcarUltimaActualizacion(){
  const ahora = new Date();
  const horaTexto = ahora.toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit', hour12:true });
  const fechaTexto = ahora.toLocaleDateString('es-CO', { day:'2-digit', month:'2-digit', year:'numeric' });
  document.getElementById('horaActualizacion').textContent = `${fechaTexto}, ${horaTexto}`;
}

function conectarEventos(){
  document.getElementById('btnAplicar').addEventListener('click', aplicarFiltros);
  document.getElementById('btnLimpiar').addEventListener('click', limpiarFiltros);
  document.getElementById('btnActualizar').addEventListener('click', async ()=>{
    document.getElementById('loadingScreen').classList.remove('hidden');
    setLoaderProgress(20, "Actualizando datos…");
    try{
      await cargarDatos();
      poblarFiltros();
      construirLayout();
      poblarFiltros();
      conectarEventos();
      aplicarFiltros();
      marcarUltimaActualizacion();
      setLoaderProgress(100, "Actualizado");
    }catch(err){
      console.error("Error actualizando datos:", err);
      mostrarErrorFatal(err.message || err);
    }finally{
      setTimeout(ocultarPantallaCarga, 300);
    }
  });

  document.getElementById('tablaBuscar').addEventListener('input', debounce((e)=>{
    STATE.tableState.search = e.target.value;
    STATE.tableState.page = 1;
    renderTablaOperativa();
  }, 250));

  document.querySelectorAll('#tablaOperativa th[data-field]').forEach(th=>{
    th.addEventListener('click', ()=>{
      const campo = th.dataset.field;
      if(STATE.tableState.sortField === campo){
        STATE.tableState.sortDir = STATE.tableState.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        STATE.tableState.sortField = campo;
        STATE.tableState.sortDir = 'asc';
      }
      renderTablaOperativa();
    });
  });

  document.getElementById('btnExportExcel').addEventListener('click', exportarExcel);
  document.getElementById('btnExportPDF').addEventListener('click', exportarPDF);
  document.getElementById('btnImprimir').addEventListener('click', imprimirTabla);
}

function ocultarPantallaCarga(){
  const pantalla = document.getElementById('loadingScreen');
  if(pantalla) pantalla.classList.add('hidden');
}

function mostrarErrorFatal(mensaje){
  const main = document.getElementById('mainContent') || document.body;
  const div = document.createElement('div');
  div.className = 'demo-banner';
  div.style.margin = '24px 0';
  div.innerHTML = `⚠ Ocurrió un error inesperado construyendo el dashboard: <b>${mensaje}</b>. Revise la consola del navegador (F12) para más detalle.`;
  main.prepend(div);
}

async function iniciarAplicacion(){
  try{
    actualizarFechaEncabezado();
    inicializarTema();
    setLoaderProgress(5, "Iniciando Torre de Control Operativa…");
    await cargarDatos();
    construirLayout();
    poblarFiltros();
    conectarEventos();
    try{
      aplicarFiltros();
    }catch(errRender){
      console.error("Error renderizando los módulos:", errRender);
      mostrarErrorFatal(errRender.message || errRender);
    }
    marcarUltimaActualizacion();
    setLoaderProgress(100, "Listo");
    validarDashboard();
  }catch(errFatal){
    console.error("Error fatal iniciando la aplicación:", errFatal);
    construirLayout();
    mostrarErrorFatal(errFatal.message || errFatal);
  }finally{
    setTimeout(ocultarPantallaCarga, 350);
  }
}

// Red de seguridad: cualquier excepción no controlada en cualquier punto de la
// aplicación libera la pantalla de carga en vez de dejarla bloqueada para siempre.
window.addEventListener('error', ()=> ocultarPantallaCarga(), true);
window.addEventListener('unhandledrejection', ()=> ocultarPantallaCarga());

document.addEventListener('DOMContentLoaded', iniciarAplicacion);
</script>
